<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GrifLauncher | Донат магазин</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">GRIF LAUNCHER</div>
            <div class="online-badge" id="statusBadge">🔄 Проверка...</div>
        </header>

        <!-- Статус сервера -->
        <div class="status-card" id="serverStatus">
            <div class="status-row">
                <span>🌐 Сервер:</span>
                <span id="serverOnline">—</span>
            </div>
            <div class="status-row">
                <span>👥 Игроки:</span>
                <span id="serverPlayers">—</span>
            </div>
            <div class="status-row">
                <span>🎮 Версия:</span>
                <span id="serverVersion">—</span>
            </div>
        </div>

        <!-- Магазин -->
        <div class="section-title">🛒 Магазин привилегий</div>
        <div class="store-grid" id="storeGrid"></div>

        <div class="footer">
            💰 Валюта: <strong>GM</strong> | Начальный баланс: 50 000 GM
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
