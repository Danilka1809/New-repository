name: Запуск Minecraft

on: [workflow_dispatch]

jobs:
  build-and-run-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # --- НОВЫЙ ШАГ: Скачиваем сервер ---
      - name: Download Minecraft Server
        run: |
          # Создаем папку для сервера
          mkdir server
          # Переходим в неё
          cd server
          # Скачиваем файл server.jar
          wget https://piston-data.mojang.com/v1/objects/f02f4473dbf152c23d7d4849551f1caf45208142/server.jar
        # --- КОНЕЦ НОВОГО ШАГА ---

      - name: Accept EULA and Run Server
        run: |
          cd server
          # Принимаем лицензионное соглашение (иначе сервер не запустится)
          echo "eula=true" > eula.txt
          # Запускаем сервер
          java -Xmx1024M -Xms1024M -jar server.jar nogui
