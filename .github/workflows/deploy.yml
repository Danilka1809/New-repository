name: Запуск Minecraft

on: [workflow_dispatch]

jobs:
  build-and-run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and Run Server
        run: |
          # Создаем папку для сервера и переходим в неё
          mkdir server
          cd server

          # Скачиваем файл с MCServerJars. Эта ссылка должна работать.
          wget https://api.mcserverjars.com/api/purpur/1.21.4/latest/download -O server.jar

          # Принимаем лицензию и запускаем сервер
          echo "eula=true" > eula.txt
          java -Xmx1024M -Xms1024M -jar server.jar nogui
