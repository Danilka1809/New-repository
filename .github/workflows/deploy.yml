name: Запуск Minecraft

on: [workflow_dispatch]

jobs:
  build-and-run-server:
    runs-on: ubuntu-latest
    
    steps:
      # Установка Java 21 (необходима для современных сборок PaperMC)
      - name: Установка JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'  # Обязательно указываем Java 21
          distribution: 'temurin'
      
      # Создание директории и переход в неё
      - name: Создание папки для сервера
        run: |
          mkdir server
          cd server
      
      # Скачивание последней версии PaperMC 1.21.4
      - name: Скачивание сервера
        run: |
          cd server
          wget https://api.purpurmc.org/v2/purpur/1.21.4/2416/download -O server.
