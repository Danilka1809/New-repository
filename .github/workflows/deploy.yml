name: Запуск Minecraft

on: [workflow_dispatch]

jobs:
  build-and-run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and Run Server
        run: |
          # Создаем папку для сервера
          mkdir server
          cd server

          # Скачиваем файл напрямую с Purpur (это официальная ссылка)
          wget https://api.purpurmc.org/v2/purpur/1.21.4/latest/download.jar -O server.jar

          # Принимаем лицензию и запускаем
          echo "eula=true" > eula.txt
          java -Xmx1024M -Xms1024M -jar server.jar nogui
