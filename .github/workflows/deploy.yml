name: Запуск Minecraft

# Эта строчка включает ручной запуск
on: [workflow_dispatch]

jobs:
  build-and-run-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Server
        run: |
          # Запускаем сервер напрямую в этом терминале
          java -Xmx1024M -Xms1024M -jar server.jar nogui
