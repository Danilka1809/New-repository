<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrifLauncher | Профиль</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">GRIF LAUNCHER</div>

            <a href="wiki.html" class="menu-item"><i class="fas fa-book"></i> База знаний</a>
        </div>

        <div class="profile-container">

            </div>
            <div class="profile-tabs">
                <button class="tab-btn active">Активные привилегии</button>
                <button class="tab-btn">История покупок</button>
                <button class="tab-btn">Друзья</button>
                <button class="tab-btn">Настройки</button>
            </div>
            <div id="tabContent" class="tab-content">
                <div class="badges-list"><div class="badge-item"><i class="fas fa-crown"></i><div><b>VIP Стандарт</b><div>Истекает: 15.07.2026</div></div></div></div>
            </div>
