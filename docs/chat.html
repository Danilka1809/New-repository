<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrifLauncher | Чаты</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">GRIF LAUNCHER</div>
        <div class="sidebar-menu">
            <a href="index.html" class="menu-item"><i class="fas fa-home"></i> Главная</a>
            <a href="chat.html" class="menu-item active"><i class="fas fa-comments"></i> Чаты</a>
            <a href="shop.html" class="menu-item"><i class="fas fa-store"></i> Магазин</a>
            <a href="profile.html" class="menu-item"><i class="fas fa-user"></i> Профиль</a>
            <a href="wiki.html" class="menu-item"><i class="fas fa-book"></i> База знаний</a>
        </div>
        <div class="sidebar-footer">
            <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </div>
    </div>

    <div class="main-content chat-layout">
        <div class="channels-sidebar">
            <div class="channels-header">💬 Диалоги</div>
            <div id="channelsList">
                <div class="channel active"><img src="https://ui-avatars.com/api/?background=ff6b6b&color=fff&name=G"><div><b>GrifMcPro</b><div>Онлайн</div></div><span class="unread">2</span></div>
                <div class="channel"><img src="https://ui-avatars.com/api/?background=3b82f6&color=fff&name=D"><div><b>DarkKnight</b><div>Был 5 мин назад</div></div></div>
                <div class="channel-group"><i class="fas fa-hashtag"></i><div><b>#общий</b><div>128 участников</div></div><span class="unread">15</span></div>
                <div class="channel-group"><i class="fas fa-hashtag"></i><div><b>#торговля</b><div>45 участников</div></div></div>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-header"><img src="https://ui-avatars.com/api/?background=ff6b6b&color=fff&name=G"><h3>GrifMcPro</h3><span class="status">онлайн</span></div>
            <div class="messages" id="messages">
                <div class="message"><img src="https://ui-avatars.com/api/?background=ff6b6b&color=fff&name=G"><div><b>GrifMcPro</b><div>Привет! Давно не виделись</div><span class="time">12:30</span></div></div>
                <div class="message own"><img src="https://ui-avatars.com/api/?background=3b82f6&color=fff&name=You"><div><b>Вы</b><div>Привет! Давай сегодня поиграем?</div><span class="time">12:31</span></div></div>
            </div>
            <div class="message-input">
                <button class="emoji-btn">😊</button>
                <input type="text" placeholder="Напишите сообщение...">
                <button class="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
