<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GrifLauncher</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e17;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #eef2ff;
            padding-bottom: 70px;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Стили для карточек и элементов */
        .glass-card {
            background: rgba(18,25,45,0.6);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(59,130,246,0.2);
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(90deg, #fff, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(0,0,0,0.4);
            border: 1px solid #3b82f6;
            border-radius: 40px;
            color: white;
        }
        button {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.01); opacity: 0.9; }
        .balance { color: #facc15; font-size: 24px; font-weight: bold; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .privilege-card { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 16px; text-align: center; }
        .friend-card { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 16px; padding: 12px; margin: 12px 0; }
        .message { background: rgba(59,130,246,0.15); border-radius: 12px; padding: 8px; margin-bottom: 8px; border-left: 3px solid #3b82f6; }
        .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .hidden { display: none !important; }
        #toast { position: fixed; bottom: 80px; right: 20px; background: #22c55e; padding: 12px 24px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; }
        
        /* НИЖНЕЕ МЕНЮ */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,14,23,0.95);
            backdrop-filter: blur(16px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px;
            border-top: 1px solid rgba(59,130,246,0.4);
            z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; padding: 6px 12px; border-radius: 40px;
            transition: all 0.2s; color: #8b9dc3;
        }
        .nav-item.active { color: #3b82f6; background: rgba(59,130,246,0.2); }
        .nav-icon { font-size: 24px; }
        .nav-label { font-size: 11px; font-weight: 500; }
        
        .page { display: none; }
        .page.active-page { display: block; }
        
        /* Стили для галочек */
        .badge-white { color: #ffffff; font-weight: bold; margin-left: 5px; }
        .badge-gold { color: #facc15; font-weight: bold; margin-left: 5px; }
        .badge-blue { color: #3b82f6; font-weight: bold; margin-left: 5px; }
        .badge-rainbow { background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet); -webkit-background-clip: text; background-clip: text; color: transparent; margin-left: 5px; font-weight: bold; }
        @keyframes rainbowShift { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        
        .badges-shop { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-top: 20px; }
        .badge-card { background: rgba(0,0,0,0.3); border-radius: 24px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; border: 1px solid #3b82f6; }
        .badge-card:hover { transform: translateY(-4px); background: rgba(59,130,246,0.2); }
        
        .avatar-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; background: #1e293b; border: 1px solid #3b82f6; }
        .avatar-selector { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin: 20px 0; }
        .avatar-option { display: inline-block; margin: 8px; cursor: pointer; border-radius: 50%; border: 2px solid transparent; transition: 0.1s; }
        .avatar-option.selected { border-color: #3b82f6; transform: scale(1.05); }
        
        /* Стили для смайл-паков */
        .emoji-pack { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 16px; margin-bottom: 16px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .emoji-pack:hover { background: rgba(59,130,246,0.2); transform: translateX(8px); }
        .emoji-pack-emojis { font-size: 24px; letter-spacing: 4px; }
        .emoji-panel { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; padding: 12px; background: rgba(0,0,0,0.4); border-radius: 28px; justify-content: center; max-height: 150px; overflow-y: auto; }
        .emoji-btn { width: 44px; height: 44px; background: rgba(59,130,246,0.2); border: none; border-radius: 50%; cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .emoji-btn:hover { background: #3b82f6; transform: scale(1.1); }
        
        .server-selector { display: flex; gap: 12px; margin-bottom: 20px; justify-content: center; }
        .server-btn { background: rgba(0,0,0,0.4); border: 1px solid rgba(59,130,246,0.3); border-radius: 40px; padding: 8px 20px; color: #eef2ff; cursor: pointer; width: auto; }
        .server-btn.active { background: #3b82f6; border-color: #3b82f6; }
    </style>
</head>

                    <div class="flex">

        </div>

            <div class="glass-card">

            </div>
        </div>
        
        <!-- СТРАНИЦА УКРАШЕНИЯ -->
        <div id="pageDecor" class="page">
            <div class="glass-card">
                <h3>✨ ГАЛОЧКИ</h3>
                <div class="badges-shop" id="badgesShop"></div>
            </div>
            <div class="glass-card">
                <h3>🎨 СМАЙЛ-ПАКИ ДЛЯ ЧАТА</h3>
                <div id="emojiPacksList"></div>
            </div>
        </div>
    </div>
</div>
