    // Функция покупки смайл-пака
    async function buyEmojiPack(packId, price) {
        if (currentBalance < price) { 
            showToast(`❌ Не хватает GM! Нужно: ${price}`, '#ef4444'); 
            return; 
        }
        if (purchasedEmojis.includes(packId)) { 
            showToast('У вас уже есть этот смайл-пак', '#facc15'); 
            return; 
        }
        await db.collection('profiles').doc(currentUser.uid).update({ 
            balance: currentBalance - price, 
            emojiPacks: [...purchasedEmojis, packId] 
        });
        currentBalance -= price;
        purchasedEmojis.push(packId);
        showToast('✅ Смайл-пак куплен!', '#22c55e');
        await renderMainUI();
    }

    // Эта функция отрисовывает панель смайлов в чате
    async function loadMessages() {
        if (!currentChatWith) return;
        const msgs = await db.collection('messages').where('chatId', '==', [currentUser.uid, currentChatWith.id].sort().join('_')).orderBy('timestamp').get();
        let html = '';
        msgs.forEach(d => { let m = d.data(); html += `<div class="message"><b>${m.from === currentUser.uid ? 'Вы' : currentChatWith.username}:</b> ${m.text}<div style="font-size:10px;color:#8b9dc3;">${m.timestamp?.toDate().toLocaleTimeString() || ''}</div></div>`; });
        document.getElementById('chatMessages').innerHTML = html || '<p>Нет сообщений</p>';
        document.getElementById('chatMessages').scrollTop = 9999;
        
        // 🟢 ГЛАВНОЕ: ОТРИСОВКА ПАНЕЛИ СМАЙЛОВ
        let emojiPanelHtml = '';
        for (let pid of purchasedEmojis) {
            let pack = emojiPacks.find(p => p.id === pid);
            if (pack) {
                pack.emojis.forEach(imgUrl => {
                    emojiPanelHtml += `<button class="emoji-btn" onclick="addEmojiToChat('${imgUrl}')"><img class="emoji-img" src="${imgUrl}" alt="emoji"></button>`;
                });
            }
        }
        if (emojiPanelHtml === '') emojiPanelHtml = '<div style="text-align: center; padding: 10px;">Купи смайл-пак в "Украшениях"!</div>';
        document.getElementById('emojiPanel').innerHTML = emojiPanelHtml;
    }

    window.addEmojiToChat = (imgUrl) => {
        let inp = document.getElementById('chatInput');
        inp.value += ` [${imgUrl}] `; // Вставляем ссылку на картинку как текст
        // Ты можешь изменить это на свой лад.
    };
