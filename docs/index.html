<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GrifLauncher | Главная</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1a 0%, #0f1724 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: #eef2ff;
            padding-bottom: 80px;
        }
        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }
        
        /* Стеклянные карточки */
        .glass-card {
            background: rgba(18,25,45,0.55);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(59,130,246,0.25);
            transition: all 0.3s;
        }
        .glass-card:hover { border-color: rgba(59,130,246,0.5); transform: translateY(-3px); }
        
        /* HERO БАННЕР */
        .hero {
            text-align: center;
            padding: 60px 20px;
            margin-bottom: 40px;
            background: radial-gradient(ellipse at 70% 30%, rgba(59,130,246,0.15), transparent);
        }
        .hero h1 {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }
        .hero p { font-size: 20px; color: #8b9dc3; margin-bottom: 32px; }
        .hero .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            padding: 14px 40px;
            font-size: 18px;
            border-radius: 60px;
            display: inline-block;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }
        .hero .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(59,130,246,0.5); }
        
        /* Секции */
        .section-title {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            margin: 40px 0 24px;
            background: linear-gradient(135deg, #fff, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Карточки товаров */
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }
        .privilege-card {
            background: linear-gradient(145deg, #111827, #0f172a);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            border: 1px solid #3b82f6;
            transition: 0.2s;
        }
        .privilege-card:hover { transform: translateY(-6px); box-shadow: 0 0 20px rgba(59,130,246,0.3); }
        .privilege-card h3 { font-size: 28px; margin-bottom: 8px; }
        .privilege-price { font-size: 26px; color: #facc15; font-weight: bold; margin: 12px 0; }
        .privilege-desc { font-size: 14px; color: #8b9dc3; margin-bottom: 16px; min-height: 60px; }
        .privilege-price small { font-size: 12px; color: #8b9dc3; }
        .gm-note { font-size: 11px; color: #6c7a91; margin-top: 8px; }
        .buy-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            border: none;
            color: white;
            cursor: pointer;
            margin-top: 16px;
        }
        
        /* FAQ */
        .faq-item {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .faq-item:hover { background: rgba(59,130,246,0.15); }
        .faq-question { font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; }
        .faq-answer { display: none; margin-top: 12px; color: #8b9dc3; line-height: 1.5; }
        
        /* Нижнее меню */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,14,23,0.95);
            backdrop-filter: blur(16px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px;
            border-top: 1px solid rgba(59,130,246,0.4);
            z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; padding: 6px 12px; border-radius: 40px;
            color: #8b9dc3; transition: 0.2s;
        }
        .nav-item.active { color: #3b82f6; background: rgba(59,130,246,0.2); }
        .nav-icon { font-size: 24px; }
        .nav-label { font-size: 11px; font-weight: 500; }
        
        .page { display: none; }
        .page.active-page { display: block; }
        
        /* Чат */
        .chat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 28px; }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .chat-messages { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 12px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { background: rgba(59,130,246,0.2); border-radius: 12px; padding: 8px 12px; max-width: 80%; align-self: flex-start; }
        .message.own { background: rgba(34,197,94,0.2); align-self: flex-end; text-align: right; border-right: 2px solid #22c55e; }
        .message-sender { font-size: 11px; color: #8b9dc3; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
        .badge-rainbow { background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet); -webkit-background-clip: text; background-clip: text; color: transparent; animation: rainbow 2s linear infinite; background-size: 200%; }
        @keyframes rainbow { 0% { background-position: 0%; } 100% { background-position: 200%; } }
        .emoji-panel { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; background: rgba(0,0,0,0.3); border-radius: 28px; padding: 12px; max-height: 100px; overflow-y: auto; }
        .emoji-btn { width: 44px; height: 44px; background: rgba(59,130,246,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 26px; transition: 0.1s; }
        .friend-card { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(0,0,0,0.4);
            border: 1px solid #3b82f6;
            border-radius: 40px;
            color: white;
        }
        #toast { position: fixed; bottom: 80px; right: 20px; background: #22c55e; padding: 12px 24px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; }
        .flex { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .balance { color: #facc15; font-size: 24px; font-weight: bold; }
        .avatar-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #3b82f6; }
        .server-selector { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
        .server-btn { background: rgba(0,0,0,0.4); border: 1px solid rgba(59,130,246,0.3); border-radius: 40px; padding: 8px 20px; cursor: pointer; width: auto; }
        .server-btn.active { background: #3b82f6; }
        .back-btn { background: #ef4444; padding: 6px 16px; border-radius: 40px; cursor: pointer; display: inline-block; font-size: 14px; margin-bottom: 16px; width: auto; }
    </style>
</head>
<body>
<div class="container" id="app"></div>
<div id="toast"></div>

<div class="bottom-nav" id="bottomNav">
    <div class="nav-item active" data-page="main"><div class="nav-icon">🏠</div><div class="nav-label">Главная</div></div>
    <div class="nav-item" data-page="profile"><div class="nav-icon">👤</div><div class="nav-label">Профиль</div></div>
    <div class="nav-item" data-page="friends"><div class="nav-icon">👥</div><div class="nav-label">Друзья</div></div>
    <div class="nav-item" data-page="chat"><div class="nav-icon">💬</div><div class="nav-label">Чат</div></div>
    <div class="nav-item" data-page="shop"><div class="nav-icon">🛒</div><div class="nav-label">Магазин</div></div>
</div>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCDHaYgSlhr-fvv8kPysZtfMWsXLHIfh48",
        authDomain: "griflaunc.firebaseapp.com",
        projectId: "griflaunc",
        storageBucket: "griflaunc.firebasestorage.app",
        messagingSenderId: "946120100074",
        appId: "1:946120100074:web:b672de237e7101b5a9ef93"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null, currentProfile = null, currentBalance = 0, selectedServer = 'survival', friendsList = [], currentChatFriend = null;
    let purchasedBadges = [], purchasedEmojis = [];
    
    const privileges = [
        { name: '🎨 Креатив', price: 1000, key: 'creative', desc: 'Режим творчества, /fly, /gm 1', days: '30 дней' },
        { name: '🛡️ Модер', price: 2500, key: 'moder', desc: 'Присмотр за порядком, /mute, /kick', days: '30 дней' },
        { name: '⚔️ Лорд', price: 5000, key: 'lord', desc: 'Уважение, /god, /heal', days: '60 дней' },
        { name: '👑 Админ', price: 10000, key: 'admin', desc: 'Управление сервером, полный контроль', days: 'Навсегда' },
        { name: '🔱 Гл. Админ', price: 20000, key: 'headadmin', desc: 'Правая рука владельца', days: 'Навсегда' },
        { name: '💎 Владелец', price: 50000, key: 'owner', desc: 'Абсолютная власть, все команды', days: 'Навсегда' }
    ];
    
    const emojiPacks = [
        { id: 1, name: '📱 Telegram Pack', price: 10000, emojis: ['✅','✔️','⭐','🔥','❤️','💙'] },
        { id: 2, name: '👑 Royal Pack', price: 20000, emojis: ['👑','💎','⭐','🌟','✨','⚡'] }
    ];
    
    const botData = { id: "BOT_GRIFMCPRO", username: "GrifMcPro", tag: "@grifmcpro", avatar: "https://cdn-icons-png.flaticon.com/512/1998/1998708.png", badge: "rainbow" };

    function showToast(msg, color = '#22c55e') { let t = document.getElementById('toast'); t.style.backgroundColor = color; t.innerText = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); }
    async function sendEmail(subject, text) { await fetch('https://api.web3forms.com/submit', { method: 'POST', body: JSON.stringify({ access_key: '42864224-6df0-4e25-8068-7b486cf314dd', name: 'GrifLauncher', email: 'ramonenok@bk.ru', subject: subject, message: text }), headers: { 'Content-Type': 'application/json' } }).catch(console.error); }
    
    async function loadProfile() {
        if (!currentUser) return;
        let doc = await db.collection('profiles').doc(currentUser.uid).get();
        if (doc.exists) {
            currentProfile = doc.data(); currentBalance = currentProfile.balance || 50000;
            purchasedBadges = currentProfile.badges || []; purchasedEmojis = currentProfile.emojiPacks || [];
        } else {
            await db.collection('profiles').doc(currentUser.uid).set({ username: currentUser.email.split('@')[0], tag: '@'+currentUser.email.split('@')[0], balance: 50000, badges: [], emojiPacks: [] });
            currentProfile = { username: currentUser.email.split('@')[0], tag: '@'+currentUser.email.split('@')[0], balance: 50000, badges: [], emojiPacks: [] };
            currentBalance = 50000;
        }
    }
    
    async function loadFriends() {
        if (!currentUser) return;
        let friendsSnap = await db.collection('friends').where('userId', '==', currentUser.uid).where('status', '==', 'accepted').get();
        friendsList = [];
        for (let doc of friendsSnap.docs) {
            let friendData = await db.collection('profiles').doc(doc.data().friendId).get();
            if (friendData.exists) friendsList.push({ id: friendData.id, ...friendData.data() });
        }
        if (!friendsList.find(f => f.id === botData.id)) friendsList.unshift(botData);
    }
    
    async function sendMessage(toId, text) {
        let chatId = [currentUser.uid, toId].sort().join('_');
        await db.collection('messages').add({ chatId, from: currentUser.uid, text, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        if (toId === botData.id) {
            setTimeout(async () => {
                await db.collection('messages').add({ chatId, from: botData.id, text: 'Привет! Я оригинальный бот этого сайта. Я ещё на обновлении, это бета-тест.', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                if (currentChatFriend && currentChatFriend.id === botData.id) loadMessages();
            }, 1000);
        }
    }
    
    async function loadMessages() {
        if (!currentChatFriend) return;
        let chatId = [currentUser.uid, currentChatFriend.id].sort().join('_');
        let msgs = await db.collection('messages').where('chatId', '==', chatId).orderBy('timestamp').get();
        let container = document.getElementById('chatMessages');
        if (!container) return;
        container.innerHTML = '';
        msgs.forEach(doc => {
            let msg = doc.data();
            let isOwn = msg.from === currentUser.uid;
            let isBot = msg.from === botData.id;
            let senderName = isOwn ? 'Вы' : (isBot ? botData.username : currentChatFriend.username);
            let badgeHtml = (isBot && botData.badge === 'rainbow') ? '<span class="badge-rainbow">🌈✓</span>' : '';
            container.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><div class="message-sender">${senderName}${badgeHtml}</div><div>${msg.text}</div></div>`;
        });
        container.scrollTop = container.scrollHeight;
    }
    
    async function renderMainUI() {
        if (!currentUser) return;
        await loadProfile(); await loadFriends();
        
        // HERO
        let heroHtml = `
            <div class="hero">
                <h1>GRIF LAUNCHER</h1>
                <p>Лучший игровой опыт на Minecraft сервере</p>
                <button class="btn-primary" id="scrollToShopBtn">🛒 Перейти в магазин</button>
            </div>
            <div class="glass-card" style="padding: 40px; text-align: center;">
                <div class="flex" style="justify-content: center; gap: 40px; flex-wrap: wrap;">
                    <div><span style="font-size: 32px; color: #3b82f6;">+1000</span><br>Активных игроков</div>
                    <div><span style="font-size: 32px; color: #facc15;">24/7</span><br>Поддержка</div>
                    <div><span style="font-size: 32px; color: #22c55e;">Мгновенно</span><br>Выдача доната</div>
                </div>
            </div>
        `;
        
        // Магазин
        let storeHtml = `<div class="store-grid">`;
        privileges.forEach(p => {
            storeHtml += `
                <div class="privilege-card">
                    <h3>${p.name}</h3>
                    <div class="privilege-price">💰 ${p.price} GM</div>
                    <div class="privilege-desc">${p.desc}<br>⏱️ ${p.days}</div>
                    <input type="text" id="nick_${p.key}" placeholder="Ваш ник на сервере">
                    <button class="buy-btn" onclick="buyPrivilege('${p.key}', ${p.price})">🎁 КУПИТЬ</button>
                    <div class="gm-note">* Цена указана в игровой валюте / баллах сервера (GM)</div>
                </div>
            `;
        });
        storeHtml += `</div>`;
        
        // FAQ
        let faqHtml = `
            <div class="faq-item" onclick="toggleFaq(this)">
                <div class="faq-question">❓ Как мне получить товар после оплаты?<span>▼</span></div>
                <div class="faq-answer">После покупки привилегия выдаётся автоматически в течение 10 минут. Если возникли проблемы — напишите в поддержку.</div>
            </div>
            <div class="faq-item" onclick="toggleFaq(this)">
                <div class="faq-question">❓ Что делать, если донат не пришел?<span>▼</span></div>
                <div class="faq-answer">Проверьте правильность введённого ника. Если всё верно — обратитесь в поддержку через Telegram или Discord.</div>
            </div>
            <div class="faq-item" onclick="toggleFaq(this)">
                <div class="faq-question">❓ Могу ли я вернуть средства?<span>▼</span></div>
                <div class="faq-answer">Все покупки являются окончательными. Возврат возможен только при технических проблемах на стороне сервера.</div>
            </div>
        `;
        
        document.getElementById('app').innerHTML = `
            <div id="authContainer"></div>
            <div id="mainContainer">
                <!-- ГЛАВНАЯ СТРАНИЦА -->
                <div id="pageMain" class="page active-page">
                    ${heroHtml}
                    <div class="section-title">✨ ДОСТУПНЫЕ ПРИВИЛЕГИИ</div>
                    <div class="server-selector">
                        <button class="server-btn active" data-server="survival">🏔️ Выживание #1</button>
                        <button class="server-btn" data-server="test">🧪 Тест сервер</button>
                    </div>
                    ${storeHtml}
                    <div class="section-title">❓ ЧАСТО ЗАДАВАЕМЫЕ ВОПРОСЫ</div>
                    ${faqHtml}
                </div>
                
                <!-- ПРОФИЛЬ -->
                <div id="pageProfile" class="page">
                    <div class="glass-card" style="padding: 24px;">
                        <div class="flex" style="justify-content: space-between;">
                            <div><h2 id="profileUsername"></h2><div id="profileTag"></div><div class="balance" id="profileBalance"></div></div>
                            <img class="avatar-img" id="avatarImg" src="https://ui-avatars.com/api/?background=3b82f6&color=fff&size=70">
                        </div>
                        <div style="margin-top: 20px;"><input type="text" id="editUsername" placeholder="Новый никнейм"><input type="text" id="editTag" placeholder="Новый тег"><button id="saveProfileBtn">Сохранить</button></div>
                        <button id="logoutBtn" style="background:#ef4444; margin-top: 16px;">🚪 Выйти</button>
                    </div>
                </div>
                
                <!-- ДРУЗЬЯ -->
                <div id="pageFriends" class="page">
                    <div class="glass-card"><h3>👥 МОИ ДРУЗЬЯ</h3><div id="friendsList"></div><div class="flex"><input type="text" id="searchFriendInput" placeholder="Поиск"><button id="searchFriendBtn">🔍</button></div><div id="searchResults"></div></div>
                </div>
                
                <!-- ЧАТ -->
                <div id="pageChat" class="page">
                    <div class="glass-card">
                        <div id="chatSelectorView"><h3>💬 ВЫБЕРИ ДРУГА</h3><div id="chatFriendsList"></div></div>
                        <div id="chatConversationView" style="display:none;">
                            <div class="back-btn" id="backToListBtn">← Назад</div>
                            <div class="chat-header" id="chatHeader"></div>
                            <div id="chatMessages" class="chat-messages"></div>
                            <div class="emoji-panel" id="emojiPanel"></div>
                            <div class="flex"><input type="text" id="chatInput" placeholder="Сообщение..."><button id="sendMsgBtn">📤</button></div>
                        </div>
                    </div>
                </div>
                
                <!-- МАГАЗИН (дубль) -->
                <div id="pageShop" class="page">
                    <div class="server-selector">
                        <button class="server-btn active" data-server="survival">🏔️ Выживание #1</button>
                        <button class="server-btn" data-server="test">🧪 Тест сервер</button>
                    </div>
                    ${storeHtml}
                </div>
            </div>
            <div class="bottom-nav">
                <div class="nav-item active" data-page="main"><div class="nav-icon">🏠</div><div class="nav-label">Главная</div></div>
                <div class="nav-item" data-page="profile"><div class="nav-icon">👤</div><div class="nav-label">Профиль</div></div>
                <div class="nav-item" data-page="friends"><div class="nav-icon">👥</div><div class="nav-label">Друзья</div></div>
                <div class="nav-item" data-page="chat"><div class="nav-icon">💬</div><div class="nav-label">Чат</div></div>
                <div class="nav-item" data-page="shop"><div class="nav-icon">🛒</div><div class="nav-label">Магазин</div></div>
            </div>
        `;
        
        // Навигация
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                let pageId = item.dataset.page;
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                document.getElementById(`page${pageId.charAt(0).toUpperCase() + pageId.slice(1)}`).classList.add('active-page');
                if (pageId === 'main') document.getElementById('scrollToShopBtn')?.addEventListener('click', () => { document.getElementById('pageShop').scrollIntoView({ behavior: 'smooth' }); });
            };
        });
        document.getElementById('scrollToShopBtn')?.addEventListener('click', () => { document.getElementById('pageShop').scrollIntoView({ behavior: 'smooth' }); });
        
        // Профиль
        document.getElementById('profileUsername').innerHTML = currentProfile.username;
        document.getElementById('profileTag').innerHTML = currentProfile.tag;
        document.getElementById('profileBalance').innerHTML = currentBalance + ' GM';
        document.getElementById('saveProfileBtn').onclick = async () => {
            let newName = document.getElementById('editUsername').value.trim();
            let newTag = document.getElementById('editTag').value.trim();
            if (newName) await db.collection('profiles').doc(currentUser.uid).update({ username: newName });
            if (newTag) await db.collection('profiles').doc(currentUser.uid).update({ tag: newTag });
            showToast('Профиль обновлён'); await renderMainUI();
        };
        document.getElementById('logoutBtn').onclick = async () => { await auth.signOut(); location.reload(); };
        
        // Друзья
        let friendsHtml = ''; friendsList.forEach(f => { friendsHtml += `<div class="friend-card" onclick="selectChatFriend('${f.id}', '${f.username}')"><div><b>${f.username}</b> ${f.tag}</div><span>💬</span></div>`; });
        document.getElementById('friendsList').innerHTML = friendsHtml || '<p>Нет друзей</p>';
        document.getElementById('chatFriendsList').innerHTML = friendsHtml;
        document.getElementById('searchFriendBtn').onclick = async () => {

            let results = []; snapshot.forEach(d => { if (d.id !== currentUser.uid && !friendsList.find(f => f.id === d.id)) results.push({ id: d.id, ...d.data() }); });
            document.getElementById('searchResults').innerHTML = results.map(u => `<div class="friend-card" onclick="addFriend('${u.id}')"><div><b>${u.username}</b> ${u.tag}</div><button>➕ Добавить</button></div>`).join('') || '<p>Не найдено</p>';
        };
        
        // Смайлы
        let emojiPanelHtml = ''; for (let pid of purchasedEmojis) { let pack = emojiPacks.find(p => p.id === pid); if (pack) pack.emojis.forEach(e => { emojiPanelHtml += `<div class="emoji-btn" onclick="addEmojiToChat('${e}')">${e}</div>`; }); }

                document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));

                selectedServer = btn.dataset.server;
                renderMainUI();
            };
        });
    }
    
    window.buyPrivilege = async (key, price) => {

        await db.collection('profiles').doc(currentUser.uid).update({ balance: currentBalance - price });
        currentBalance -= price;
        await sendEmail('Покупка привилегии', `Игрок ${nick} купил ${key} за ${price} GM на сервере ${selectedServer === 'survival' ? 'Выживание #1' : 'Тест сервер'}`);

        await renderMainUI();
    };
