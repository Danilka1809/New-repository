<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GrifLauncher | Привилегии</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: #e0e0e0;
            scroll-behavior: smooth;
        }
        
        /* ШАПКА */
        .header {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 107, 107, 0.2);
        }
        .nav {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
        }
        .nav-links a:hover { color: #ff6b6b; }
        
        /* ГЛАВНЫЙ ЭКРАН */
        .hero {
            max-width: 1300px;
            margin: 60px auto;
            text-align: center;
            padding: 40px 20px;
            background: radial-gradient(ellipse at 70% 30%, rgba(255,107,107,0.1), transparent);
        }
        .hero h1 {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }
        .hero p {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 32px;
        }
        .btn-primary {
            background: #ff6b6b;
            color: white;
            padding: 14px 48px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 15px rgba(255,107,107,0.3);
        }
        .btn-primary:hover {
            transform: scale(1.02);
            background: #ff5252;
            box-shadow: 0 0 25px rgba(255,107,107,0.5);
        }
        
        /* КОНТЕЙНЕР */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* КАРТОЧКИ ТОВАРОВ */
        .section-title {
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            margin: 60px 0 30px;
            color: #fff;
        }
        .section-title span {
            background: linear-gradient(135deg, #fff, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        .card {
            background: #111;
            border-radius: 28px;
            padding: 28px;
            transition: 0.3s;
            border: 1px solid rgba(255,107,107,0.2);
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: #ff6b6b;
            box-shadow: 0 20px 30px -15px rgba(0,0,0,0.5);
        }
        .card h3 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ff6b6b;
        }
        .price {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            margin: 16px 0;
        }
        .price small {
            font-size: 14px;
            color: #888;
            font-weight: normal;
        }
        .duration {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .features {
            list-style: none;
            margin: 20px 0;
        }
        .features li {
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .features li::before {
            content: "✓";
            color: #ff6b6b;
            font-weight: bold;
        }
        .buy-btn {
            width: 100%;
            background: #ff6b6b;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 16px;
        }
        .buy-btn:hover { background: #ff5252; transform: scale(1.01); }
        
        /* ПРЕИМУЩЕСТВА */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin: 40px 0;
            text-align: center;
        }
        .feature-item {
            background: #111;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255,107,107,0.2);
        }
        .feature-icon { font-size: 48px; margin-bottom: 16px; display: block; }
        .feature-item h4 { font-size: 20px; margin-bottom: 8px; color: #ff6b6b; }
        
        /* FAQ */
        .faq-item {
            background: #111;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .faq-item:hover { background: #1a1a1a; }
        .faq-question {
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            color: #fff;
        }
        .faq-answer {
            display: none;
            margin-top: 12px;
            color: #aaa;
            line-height: 1.5;
        }
        
        /* ПОДВАЛ */
        .footer {
            text-align: center;
            padding: 40px;
            margin-top: 60px;
            border-top: 1px solid rgba(255,107,107,0.2);
            color: #666;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 16px 0 8px;
            background: #1a1a1a;
            border: 1px solid #ff6b6b;
            border-radius: 40px;
            color: white;
        }
        .gm-note {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: 8px;
        }
        @media (max-width: 768px) {
            .hero h1 { font-size: 40px; }
            .nav { flex-direction: column; }
            .section-title { font-size: 28px; }
        }
        #toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #22c55e; padding: 12px 24px;
            border-radius: 40px; opacity: 0; transition: 0.2s;
            z-index: 1000; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <div class="logo">GRIF LAUNCHER</div>
            <div class="nav-links">
                <a onclick="scrollToShop()">МАГАЗИН</a>
                <a onclick="scrollToFeatures()">ПРЕИМУЩЕСТВА</a>
                <a onclick="scrollToFaq()">FAQ</a>
            </div>
        </div>
    </div>
    
    <div class="hero">
        <h1>GRIF LAUNCHER</h1>
        <p>Приобрети привилегии и выделись среди других игроков!</p>
        <button class="btn-primary" onclick="scrollToShop()">🛒 КУПИТЬ ДОНАТ</button>
    </div>
    
    <div class="container" id="app"></div>
    <div class="footer">
        <p>© 2026 GrifLauncher. Все права защищены.</p>
    </div>
    <div id="toast"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCDHaYgSlhr-fvv8kPysZtfMWsXLHIfh48",
        authDomain: "griflaunc.firebaseapp.com",
        projectId: "griflaunc",
        storageBucket: "griflaunc.firebasestorage.app",
        messagingSenderId: "946120100074",
        appId: "1:946120100074:web:b672de237e7101b5a9ef93"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null, currentBalance = 0;
    
    const products = [
        { name: '🎖️ VIP Стандарт', price: 150, key: 'vip', desc: 'Базовый набор привилегий', days: '10 дней', features: ['Цветной ник', 'Команда /kit', 'Доступ к /fly', 'Приватный дом'] },
        { name: '👑 VIP+ Продвинутый', price: 350, key: 'vip_plus', desc: 'Расширенные возможности', days: '30 дней', features: ['Всё из VIP', 'VIP-чат', 'Префикс [VIP]', '/heal, /near'] },
        { name: '💎 MVP Вечный', price: 1000, key: 'mvp', desc: 'Максимальные привилегии', days: 'Навсегда', features: ['Всё из VIP+', 'Префикс [KING]', 'Выделенный спавн', 'Доступ к /god', 'Бесплатные бэкапы'] }
    ];

    function showToast(msg, color = '#22c55e') { let t = document.getElementById('toast'); t.style.backgroundColor = color; t.innerText = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); }
    async function sendEmail(subject, text) { await fetch('https://api.web3forms.com/submit', { method: 'POST', body: JSON.stringify({ access_key: '42864224-6df0-4e25-8068-7b486cf314dd', name: 'GrifLauncher', email: 'ramonenok@bk.ru', subject: subject, message: text }), headers: { 'Content-Type': 'application/json' } }).catch(console.error); }
    
    async function loadUser() {
        if (!currentUser) return;
        let doc = await db.collection('profiles').doc(currentUser.uid).get();
        if (doc.exists) currentBalance = doc.data().balance || 0;
        else currentBalance = 0;
    }
    
    async function renderShop() {
        if (!currentUser) {
            document.getElementById('app').innerHTML = `
                <div style="max-width:400px; margin:60px auto; background:#111; padding:40px; border-radius:28px; text-align:center;">
                    <h3>Войдите в аккаунт</h3>
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPass" placeholder="Пароль">
                    <button class="buy-btn" id="doLogin">Войти</button>
                    <div style="margin-top:20px;">
                        <input type="text" id="regUsername" placeholder="Никнейм">
                        <input type="email" id="regEmail" placeholder="Email">
                        <input type="password" id="regPass" placeholder="Пароль">
                        <button class="buy-btn" id="doRegister">Зарегистрироваться</button>
                    </div>
                </div>
            `;
            document.getElementById('doLogin').onclick = async () => { try { await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value); } catch(e) { showToast(e.message, '#ef4444'); } };
            document.getElementById('doRegister').onclick = async () => {
                let email = document.getElementById('regEmail').value, pass = document.getElementById('regPass').value, name = document.getElementById('regUsername').value;
                if(!email||!pass||!name) { showToast('Заполните все поля','#ef4444'); return; }
                try {
                    let { user } = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection('profiles').doc(user.uid).set({ username: name, balance: 50000 });
                    showToast('Регистрация успешна!');
                } catch(e) { showToast(e.message,'#ef4444'); }
            };
            return;
        }
        await loadUser();
        
        let storeHtml = `<div class="section-title"><span>🔥 ПРИВИЛЕГИИ</span></div><div class="store-grid">`;
        products.forEach(p => {
            storeHtml += `
                <div class="card">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price} ₽ <small>${p.days}</small></div>
                    <ul class="features">
                        ${p.features.map(f => `<li>${f}</li>`).join('')}
                    </ul>
                    <input type="text" id="nick_${p.key}" placeholder="Ваш никнейм на сервере">
                    <button class="buy-btn" onclick="buyProduct('${p.key}', ${p.price})">КУПИТЬ</button>
                    <div class="gm-note">* После оплаты на ваш аккаунт будут начислены GM для покупки</div>
                </div>
            `;
        });
        storeHtml += `</div>`;
        
        let featuresHtml = `
            <div class="section-title"><span>⚡ НАШИ ПРЕИМУЩЕСТВА</span></div>
            <div class="features-grid">
                <div class="feature-item"><span class="feature-icon">⚡</span><h4>Мгновенная выдача</h4><p>После оплаты привилегия приходит автоматически</p></div>
                <div class="feature-item"><span class="feature-icon">🛡️</span><h4>Надёжность</h4><p>Сервер работает 24/7, поддержка всегда на связи</p></div>
                <div class="feature-item"><span class="feature-icon">💎</span><h4>Честные цены</h4><p>Лучшее соотношение цены и качества</p></div>
            </div>
        `;
        
        let faqHtml = `
            <div class="section-title"><span>❓ ЧАСТО ЗАДАВАЕМЫЕ ВОПРОСЫ</span></div>
            <div class="faq-item" onclick="toggleFaq(this)"><div class="faq-question">Как получить товар после оплаты?<span>▼</span></div><div class="faq-answer">После успешной оплаты привилегия выдаётся автоматически в течение 5-10 минут. Укажите правильный никнейм!</div></div>
            <div class="faq-item" onclick="toggleFaq(this)"><div class="faq-question">Что делать, если донат не пришёл?<span>▼</span></div><div class="faq-answer">Проверьте правильность введённого ника. Если всё верно — напишите в поддержку через Telegram или Discord.</div></div>
            <div class="faq-item" onclick="toggleFaq(this)"><div class="faq-question">Как вернуть деньги?<span>▼</span></div><div class="faq-answer">Все покупки являются окончательными. Возврат возможен только при технических проблемах на стороне сервера.</div></div>
        `;
        
        document.getElementById('app').innerHTML = `
            ${storeHtml}
            ${featuresHtml}
            ${faqHtml}
            <div style="text-align:center; margin-top:20px;"><button class="btn-primary" id="logoutBtn" style="background:#444;">🚪 Выйти из аккаунта</button></div>
        `;
        document.getElementById('logoutBtn')?.addEventListener('click', async () => { await auth.signOut(); location.reload(); });
    }
    
    window.buyProduct = async (key, price) => {
        let nick = document.getElementById(`nick_${key}`)?.value;
        if (!nick) { showToast('Введи никнейм!', '#ef4444'); return; }
        showToast(`🔔 Заказ оформлен! После оплаты привилегия придёт в течение 10 минут.`, '#ff6b6b');
        await sendEmail('Покупка доната', `Игрок ${nick} хочет купить ${key} за ${price} ₽`);
    };
    
    window.toggleFaq = (el) => { let answer = el.querySelector('.faq-answer'); answer.style.display = answer.style.display === 'block' ? 'none' : 'block'; };
    window.scrollToShop = () => { document.querySelector('.store-grid')?.scrollIntoView({ behavior: 'smooth' }); };
    window.scrollToFeatures = () => { document.querySelector('.features-grid')?.scrollIntoView({ behavior: 'smooth' }); };
    window.scrollToFaq = () => { document.querySelector('.faq-item')?.scrollIntoView({ behavior: 'smooth' }); };
    
    auth.onAuthStateChanged(async (user) => { currentUser = user; await renderShop(); });
</script>
</body>
</html>
