<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GrifLauncher</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e17;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #eef2ff;
            padding-bottom: 80px;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .glass-card {
            background: rgba(18,25,45,0.6);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(59,130,246,0.2);
            transition: 0.2s;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(90deg, #fff, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(0,0,0,0.4);
            border: 1px solid #3b82f6;
            border-radius: 40px;
            color: white;
        }
        button {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { transform: scale(1.01); opacity: 0.9; }
        .balance { color: #facc15; font-size: 24px; font-weight: bold; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 16px; }
        .privilege-card { background: linear-gradient(145deg, #0f172a, #111827); border-radius: 24px; padding: 20px; text-align: center; border: 1px solid #3b82f6; transition: 0.2s; }
        .privilege-card:hover { transform: translateY(-5px); box-shadow: 0 0 15px rgba(59,130,246,0.3); }
        .badges-shop { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-top: 20px; }
        .badge-card { background: rgba(0,0,0,0.4); border-radius: 24px; padding: 20px; text-align: center; cursor: pointer; border: 1px solid #3b82f6; transition: 0.2s; }
        .badge-card:hover { transform: translateY(-4px); background: rgba(59,130,246,0.2); }
        .avatar-img { width: 70px; height: 70px; border-radius: 50%; background: #1e293b; border: 2px solid #3b82f6; object-fit: cover; }
        .server-selector { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
        .server-btn { background: rgba(0,0,0,0.4); border: 1px solid rgba(59,130,246,0.3); border-radius: 40px; padding: 8px 20px; cursor: pointer; width: auto; }
        .server-btn.active { background: #3b82f6; border-color: #3b82f6; }
        .question-btn { background: rgba(59,130,246,0.3); border: 1px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: rgba(18,25,45,0.95); border-radius: 32px; padding: 24px; width: 90%; max-width: 400px; border: 1px solid #3b82f6; }
        .test-buttons { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin: 16px 0; }
        .test-order-btn { background: rgba(0,0,0,0.5); border: 1px solid #3b82f6; border-radius: 16px; padding: 12px; cursor: pointer; text-align: center; }
        .friend-card { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .chat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(59,130,246,0.3); }
        .chat-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .chat-messages { height: 350px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 12px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message { background: rgba(59,130,246,0.2); border-radius: 12px; padding: 8px 12px; max-width: 80%; align-self: flex-start; }
        .message.own { background: rgba(34,197,94,0.2); align-self: flex-end; text-align: right; border-left: none; border-right: 2px solid #22c55e; }
        .message-sender { font-size: 12px; color: #8b9dc3; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
        .emoji-panel { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; background: rgba(0,0,0,0.3); border-radius: 28px; padding: 12px; max-height: 100px; overflow-y: auto; }
        .emoji-btn { width: 44px; height: 44px; background: rgba(59,130,246,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; transition: 0.1s; }
        .emoji-btn:hover { background: #3b82f6; transform: scale(1.05); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,14,23,0.95); backdrop-filter: blur(16px); display: flex; justify-content: space-around; padding: 8px 16px; border-top: 1px solid rgba(59,130,246,0.4); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 6px 12px; border-radius: 40px; color: #8b9dc3; transition: 0.2s; }
        .nav-item.active { color: #3b82f6; background: rgba(59,130,246,0.2); }
        .page { display: none; }
        .page.active-page { display: block; }
        #toast { position: fixed; bottom: 80px; right: 20px; background: #22c55e; padding: 12px 24px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; font-weight: bold; }
        .badge-white { color: #fff; margin-left: 5px; }
        .badge-gold { color: #facc15; margin-left: 5px; }
        .badge-blue { color: #3b82f6; margin-left: 5px; }
        .badge-rainbow { background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet); -webkit-background-clip: text; background-clip: text; color: transparent; margin-left: 5px; animation: rainbow 2s linear infinite; background-size: 200%; }
        @keyframes rainbow { 0% { background-position: 0%; } 100% { background-position: 200%; } }
        .flex { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .chat-friend-list { max-height: 250px; overflow-y: auto; margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
        .chat-friend-item { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.1s; }
        .chat-friend-item:hover { background: rgba(59,130,246,0.2); }
        .back-to-list { background: #ef4444; padding: 8px 16px; border-radius: 40px; width: auto; margin-bottom: 16px; cursor: pointer; display: inline-block; font-size: 14px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="logo">GRIF LAUNCHER</div>
    <div id="authContainer"></div>
    <div id="mainContainer" class="hidden">
        <!-- ПРОФИЛЬ -->
        <div id="pageProfile" class="page active-page">
            <div class="glass-card">
                <div class="flex" style="justify-content: space-between;">
                    <div><h2 id="profileUsername"></h2><div id="profileTag"></div><div class="balance" id="profileBalance"></div><div id="profileBadge" style="margin-top: 5px;"></div></div>
                    <img class="avatar-img" id="avatarImg" src="https://ui-avatars.com/api/?background=3b82f6&color=fff&size=70" alt="avatar">
                </div>
                <div style="margin-top: 20px;"><input type="text" id="editUsername" placeholder="Новый никнейм"><input type="text" id="editTag" placeholder="Новый тег (@username)"><button id="saveProfileBtn">Сохранить изменения</button></div>
                <button id="logoutBtn" style="background:#ef4444; margin-top: 20px;">🚪 Выйти</button>
            </div>
        </div>
        
        <!-- ДРУЗЬЯ -->
        <div id="pageFriends" class="page">
            <div class="glass-card"><h3>👥 МОИ ДРУЗЬЯ</h3><div id="friendsList"></div><div class="flex" style="margin-top: 16px;"><input type="text" id="searchFriendInput" placeholder="Поиск по нику или @tag"><button id="searchFriendBtn">🔍 Найти</button></div><div id="searchResults"></div></div>
        </div>
        
        <!-- ЧАТ -->
        <div id="pageChat" class="page">
            <div class="glass-card">
                <div id="chatSelectorView"><h3>💬 ВЫБЕРИ ДРУГА</h3><div id="chatFriendsList" class="chat-friend-list"></div></div>
                <div id="chatConversationView" style="display:none;">
                    <div class="flex" style="justify-content: space-between;"><div class="back-to-list" id="backToListBtn">← Назад к списку</div></div>
                    <div class="chat-header" id="chatHeader"></div>
                    <div id="chatMessages" class="chat-messages"></div>
                    <div class="emoji-panel" id="emojiPanel"></div>
                    <div class="flex"><input type="text" id="chatInput" placeholder="Сообщение..."><button id="sendMsgBtn">📤</button></div>
                </div>
            </div>
        </div>
        
        <!-- МАГАЗИН -->
        <div id="pageShop" class="page">
            <div class="server-selector"><button class="server-btn active" data-server="survival">🏔️ Выживание #1</button><div style="display: flex; align-items: center; gap: 8px;"><button class="server-btn" data-server="test">🧪 Тест сервер</button><button class="question-btn" id="testServerBtn">❓</button></div></div>
            <div class="glass-card"><h3>🎁 ПРИВИЛЕГИИ</h3><div id="storeGrid" class="store-grid"></div></div>
        </div>
        
        <!-- УКРАШЕНИЯ -->
        <div id="pageDecor" class="page">
            <div class="glass-card"><h3>✨ ГАЛОЧКИ</h3><div class="badges-shop" id="badgesShop"></div></div>
            <div class="glass-card"><h3>🎨 СМАЙЛ-ПАКИ</h3><div id="emojiPacksList"></div></div>
        </div>
    </div>
</div>
<div id="toast"></div>

<div class="bottom-nav">
    <div class="nav-item active" data-page="profile"><div class="nav-icon">👤</div><div class="nav-label">Профиль</div></div>
    <div class="nav-item" data-page="friends"><div class="nav-icon">👥</div><div class="nav-label">Друзья</div></div>
    <div class="nav-item" data-page="chat"><div class="nav-icon">💬</div><div class="nav-label">Чат</div></div>
    <div class="nav-item" data-page="shop"><div class="nav-icon">🛒</div><div class="nav-label">Магазин</div></div>
    <div class="nav-item" data-page="decor"><div class="nav-icon">✨</div><div class="nav-label">Украшения</div></div>
</div>

<div id="testModal" class="modal"><div class="modal-content"><h3>🧪 Заказ тест-сервера</h3><input type="text" id="testNick" placeholder="Ваш никнейм" style="margin: 16px 0;"><div class="test-buttons"><button class="test-order-btn" data-days="10" data-price="500000">📅 10 дней<br><span>500 000 GM</span></button><button class="test-order-btn" data-days="20" data-price="1000000">📅 20 дней<br><span>1 000 000 GM</span></button><button class="test-order-btn" data-days="30" data-price="10000000">📅 30 дней<br><span>10 000 000 GM</span></button><button class="test-order-btn" data-days="forever" data-price="50000000">♾️ Навсегда<br><span>50 000 000 GM</span></button></div><button id="closeModalBtn" style="background:#ef4444;">Закрыть</button></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCDHaYgSlhr-fvv8kPysZtfMWsXLHIfh48",
        authDomain: "griflaunc.firebaseapp.com",
        projectId: "griflaunc",
        storageBucket: "griflaunc.firebasestorage.app",
        messagingSenderId: "946120100074",
        appId: "1:946120100074:web:b672de237e7101b5a9ef93"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null, currentProfile = null, currentBalance = 0, selectedServer = 'survival', friendsList = [], currentChatFriend = null;
    let purchasedBadges = [], purchasedEmojis = [];
    const privileges = [
        { name: '🎨 Креатив', price: 1000, key: 'creative' }, { name: '🛡️ Модер', price: 2500, key: 'moder' },
        { name: '⚔️ Лорд', price: 5000, key: 'lord' }, { name: '👑 Админ', price: 10000, key: 'admin' },
        { name: '🔱 Гл. Админ', price: 20000, key: 'headadmin' }, { name: '✨ Создатель', price: 30000, key: 'creator' },
        { name: '🔥 Основатель', price: 40000, key: 'founder' }, { name: '💎 Владелец', price: 50000, key: 'owner' },
        { name: '🏛️ Цезарь', price: 70000, key: 'caesar' }, { name: '👑 ПРАВИТЕЛЬ', price: 100000, key: 'ruler' }
    ];
    const badges = [
        { id: 'white', name: 'Белая', price: 5000, style: 'badge-white', display: '✓' },
        { id: 'gold', name: 'Золотая', price: 15000, style: 'badge-gold', display: '🌟✓' },
        { id: 'blue', name: 'Синяя', price: 25000, style: 'badge-blue', display: '💙✓' },
        { id: 'rainbow', name: 'Радужная', price: 50000, style: 'badge-rainbow', display: '🌈✓' }
    ];
    const emojiPacks = [
        { id: 1, name: '📱 Telegram Pack', price: 10000, emojis: ['✅','✔️','⭐','🔥','❤️','💙'] },
        { id: 2, name: '👑 Royal Pack', price: 20000, emojis: ['👑','💎','⭐','🌟','✨','⚡'] },
        { id: 3, name: '🌈 Rainbow Pack', price: 15000, emojis: ['🌈','☀️','🌟','✨','⭐','💫'] },
        { id: 4, name: '🎮 Gaming Pack', price: 12000, emojis: ['🎮','🎯','🎲','🎰','🎳','🎴'] },
        { id: 5, name: '🎨 Grif Pack', price: 30000, emojis: ['🔥','⚡','💎','👑','🌟','✨'] }
    ];
    const botData = { id: "BOT_GRIFMCPRO", username: "GrifMcPro", tag: "@grifmcpro", avatar: "https://cdn-icons-png.flaticon.com/512/1998/1998708.png", badge: "rainbow" };

    function showToast(msg, color = '#22c55e') { let t = document.getElementById('toast'); t.style.backgroundColor = color; t.innerText = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); }
    async function sendEmail(subject, text) { await fetch('https://api.web3forms.com/submit', { method: 'POST', body: JSON.stringify({ access_key: '42864224-6df0-4e25-8068-7b486cf314dd', name: 'GrifLauncher', email: 'ramonenok@bk.ru', subject: subject, message: text }), headers: { 'Content-Type': 'application/json' } }).catch(console.error); }
    
    async function loadProfile() {
        if (!currentUser) return;
        let doc = await db.collection('profiles').doc(currentUser.uid).get();
        if (doc.exists) {
            currentProfile = doc.data(); currentBalance = currentProfile.balance || 50000;
            purchasedBadges = currentProfile.badges || []; purchasedEmojis = currentProfile.emojiPacks || [];
        } else {
            await db.collection('profiles').doc(currentUser.uid).set({ username: currentUser.email.split('@')[0], tag: '@'+currentUser.email.split('@')[0], balance: 50000, badges: [], emojiPacks: [] });
            currentProfile = { username: currentUser.email.split('@')[0], tag: '@'+currentUser.email.split('@')[0], balance: 50000, badges: [], emojiPacks: [] };
            currentBalance = 50000;
        }
    }
    
    async function loadFriends() {
        if (!currentUser) return;
        let friendsSnap = await db.collection('friends').where('userId', '==', currentUser.uid).where('status', '==', 'accepted').get();
        friendsList = [];
        for (let doc of friendsSnap.docs) {
            let friendData = await db.collection('profiles').doc(doc.data().friendId).get();
            if (friendData.exists) friendsList.push({ id: friendData.id, ...friendData.data() });
        }
        if (!friendsList.find(f => f.id === botData.id)) friendsList.unshift(botData);
    }
    
    async function sendMessage(toId, text) {
        let chatId = [currentUser.uid, toId].sort().join('_');
        await db.collection('messages').add({ chatId, from: currentUser.uid, text, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        if (toId === botData.id) {
            setTimeout(async () => {
                await db.collection('messages').add({ chatId, from: botData.id, text: 'Привет! Я оригинальный бот этого сайта. Я ещё на обновлении, это бета-тест.', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                if (currentChatFriend && currentChatFriend.id === botData.id) loadMessages();
            }, 1000);
        }
    }
    
    async function loadMessages() {
        if (!currentChatFriend) return;
        let chatId = [currentUser.uid, currentChatFriend.id].sort().join('_');
        let msgs = await db.collection('messages').where('chatId', '==', chatId).orderBy('timestamp').get();
        let container = document.getElementById('chatMessages');
        container.innerHTML = '';
        msgs.forEach(doc => {
            let msg = doc.data();
            let isOwn = msg.from === currentUser.uid;
            let isBot = msg.from === botData.id;
            let senderName = isOwn ? 'Вы' : (isBot ? botData.username : currentChatFriend.username);
            let badgeHtml = (isBot && botData.badge === 'rainbow') ? '<span class="badge-rainbow">🌈✓</span>' : '';
            container.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><div class="message-sender">${senderName}${badgeHtml}</div><div>${msg.text}</div></div>`;
        });
        container.scrollTop = container.scrollHeight;
    }
    
    async function renderMainUI() {
        if (!currentUser) return;
        await loadProfile(); await loadFriends();
        document.getElementById('profileUsername').innerHTML = currentProfile.username;
        document.getElementById('profileTag').innerHTML = currentProfile.tag;
        document.getElementById('profileBalance').innerHTML = currentBalance + ' GM';
        let badgeHtml = ''; for (let b of purchasedBadges) { let badge = badges.find(bg => bg.id === b); if (badge) badgeHtml += `<span class="${badge.style}">${badge.display}</span>`; }
        document.getElementById('profileBadge').innerHTML = badgeHtml;
        
        let storeHtml = ''; privileges.forEach(p => { storeHtml += `<div class="privilege-card"><h3>${p.name}</h3><div>💰 ${p.price} GM</div><input type="text" id="nick_${p.key}" placeholder="Ваш ник на сервере"><button onclick="buyPrivilege('${p.key}', ${p.price})">🎁 Купить</button></div>`; });
        document.getElementById('storeGrid').innerHTML = storeHtml;
        
        let badgesHtml = ''; badges.forEach(b => { let owned = purchasedBadges.includes(b.id); badgesHtml += `<div class="badge-card" onclick="${!owned ? `buyBadge('${b.id}', ${b.price})` : ''}"><div class="${b.style}" style="font-size:32px;">${b.display}</div><div>${b.name}</div><div>💰 ${b.price} GM</div>${owned ? '<div style="color:#22c55e;">✅ Куплено</div>' : ''}</div>`; });
        document.getElementById('badgesShop').innerHTML = badgesHtml;
        
        let packsHtml = ''; emojiPacks.forEach(p => { let owned = purchasedEmojis.includes(p.id); packsHtml += `<div class="badge-card" style="display:flex; justify-content:space-between;" onclick="${!owned ? `buyEmojiPack(${p.id}, ${p.price})` : ''}"><div><b>${p.name}</b><div style="font-size:24px;">${p.emojis.slice(0,4).join('')}</div></div><div>💰 ${p.price} GM${owned ? ' ✅' : ''}</div></div>`; });
        document.getElementById('emojiPacksList').innerHTML = packsHtml;
        
        let friendsHtml = ''; friendsList.forEach(f => { friendsHtml += `<div class="friend-card"><div><b>${f.username}</b> ${f.tag}</div><button onclick="selectChatFriend('${f.id}', '${f.username}')">💬 Чат</button></div>`; });
        document.getElementById('friendsList').innerHTML = friendsHtml || '<p>Друзей пока нет</p>';
        
        let chatFriendsHtml = ''; friendsList.forEach(f => { chatFriendsHtml += `<div class="chat-friend-item" onclick="selectChatFriend('${f.id}', '${f.username}')"><div><div class="flex" style="gap:8px;"><b>${f.username}</b> ${f.tag}</div></div><span>💬</span></div>`; });
        document.getElementById('chatFriendsList').innerHTML = chatFriendsHtml;
        
        let emojiPanelHtml = ''; for (let pid of purchasedEmojis) { let pack = emojiPacks.find(p => p.id === pid); if (pack) pack.emojis.forEach(emoji => { emojiPanelHtml += `<div class="emoji-btn" onclick="addEmojiToChat('${emoji}')">${emoji}</div>`; }); }
        document.getElementById('emojiPanel').innerHTML = emojiPanelHtml || '<div>Купите смайл-пак в украшениях!</div>';
    }
    
    window.buyPrivilege = async (key, price) => {
        let nick = document.getElementById(`nick_${key}`).value; if (!nick) { showToast('Введи ник!', '#ef4444'); return; }
        if (currentBalance < price) { showToast(`Не хватает GM! Нужно: ${price}`, '#ef4444'); return; }
        await db.collection('profiles').doc(currentUser.uid).update({ balance: currentBalance - price });
        currentBalance -= price;
        await sendEmail('Покупка привилегии', `Игрок ${nick} купил ${key} за ${price} GM на сервере ${selectedServer === 'survival' ? 'Выживание #1' : 'Тест сервер'}`);
        showToast(`✅ ${key} выдана! Донат придёт в течение 10 минут.`, '#22c55e');
        await renderMainUI();
    };
    window.buyBadge = async (id, price) => {
        if (currentBalance < price) { showToast(`Не хватает GM! Нужно: ${price}`, '#ef4444'); return; }
        if (purchasedBadges.includes(id)) { showToast('Уже есть!', '#facc15'); return; }
        await db.collection('profiles').doc(currentUser.uid).update({ balance: currentBalance - price, badges: [...purchasedBadges, id] });
        currentBalance -= price; purchasedBadges.push(id);
        showToast('✅ Галочка куплена!', '#22c55e');
        await renderMainUI();
    };
    window.buyEmojiPack = async (id, price) => {
        if (currentBalance < price) { showToast(`Не хватает GM! Нужно: ${price}`, '#ef4444'); return; }
        if (purchasedEmojis.includes(id)) { showToast('Уже есть!', '#facc15'); return; }
        await db.collection('profiles').doc(currentUser.uid).update({ balance: currentBalance - price, emojiPacks: [...purchasedEmojis, id] });
        currentBalance -= price; purchasedEmojis.push(id);
        showToast('✅ Смайл-пак куплен!', '#22c55e');
        await renderMainUI();
    };
    window.addEmojiToChat = (emoji) => { let inp = document.getElementById('chatInput'); inp.value += emoji; };
    window.selectChatFriend = async (id, name) => {
        currentChatFriend = friendsList.find(f => f.id === id) || { id, username: name };
        await loadMessages();
        document.getElementById('chatSelectorView').style.display = 'none';
        document.getElementById('chatConversationView').style.display = 'block';
        let avatarUrl = currentChatFriend.id === botData.id ? botData.avatar : (currentChatFriend.avatar || 'https://ui-avatars.com/api/?background=3b82f6&color=fff&size=40');
        let badgeHtml = (currentChatFriend.id === botData.id && botData.badge === 'rainbow') ? '<span class="badge-rainbow" style="margin-left:5px;">🌈✓</span>' : '';
        document.getElementById('chatHeader').innerHTML = `<img class="chat-avatar" src="${avatarUrl}"><div><b>${currentChatFriend.username}</b>${badgeHtml}<div style="font-size:12px;">${currentChatFriend.tag || ''}</div></div>`;
    };
    document.getElementById('backToListBtn').onclick = () => {
        document.getElementById('chatSelectorView').style.display = 'block';
        document.getElementById('chatConversationView').style.display = 'none';
        currentChatFriend = null;
    };
    document.getElementById('saveProfileBtn').onclick = async () => {
        let newName = document.getElementById('editUsername').value.trim(); let newTag = document.getElementById('editTag').value.trim();
        if (newName) await db.collection('profiles').doc(currentUser.uid).update({ username: newName });
        if (newTag) await db.collection('profiles').doc(currentUser.uid).update({ tag: newTag });
        showToast('Профиль обновлён!'); await renderMainUI();
    };
    document.getElementById('logoutBtn').onclick = async () => { await auth.signOut(); location.reload(); };
    document.querySelectorAll('.server-btn').forEach(btn => btn.onclick = () => { document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); selectedServer = btn.dataset.server; });
    document.getElementById('sendMsgBtn').onclick = async () => { let inp = document.getElementById('chatInput'); if (currentChatFriend && inp.value.trim()) { await sendMessage(currentChatFriend.id, inp.value); inp.value = ''; await loadMessages(); } };
    document.getElementById('searchFriendBtn').onclick = async () => {
        let query = document.getElementById('searchFriendInput').value.trim(); if (!query) return;
        let snapshot = await db.collection('profiles').where('username', '>=', query).where('username', '<=', query + '\uf8ff').get();
        let results = []; snapshot.forEach(d => { if (d.id !== currentUser.uid && !friendsList.find(f => f.id === d.id)) results.push({ id: d.id, ...d.data() }); });
        document.getElementById('searchResults').innerHTML = results.map(u => `<div class="friend-card"><div><b>${u.username}</b> ${u.tag}</div><button onclick="addFriend('${u.id}')">➕ Добавить</button></div>`).join('') || '<p>Не найдено</p>';
    };
    window.addFriend = async (id) => { await db.collection('friends').add({ userId: currentUser.uid, friendId: id, status: 'accepted' }); showToast('Друг добавлен!'); await renderMainUI(); };
    
    let modal = document.getElementById('testModal'), testBtn = document.getElementById('testServerBtn'), closeBtn = document.getElementById('closeModalBtn');
    testBtn.onclick = () => modal.style.display = 'flex';
    closeBtn.onclick = () => modal.style.display = 'none';
    document.querySelectorAll('.test-order-btn').forEach(btn => btn.onclick = async () => {
        let nick = document.getElementById('testNick').value.trim(); if (!nick) { showToast('Введи ник!', '#ef4444'); return; }
        let price = parseInt(btn.dataset.price); if (currentBalance < price) { showToast(`Не хватает GM! Нужно: ${price}`, '#ef4444'); return; }
        await db.collection('profiles').doc(currentUser.uid).update({ balance: currentBalance - price });
        currentBalance -= price;
        await sendEmail('Заказ тест-сервера', `Игрок ${nick} заказал тест-сервер на ${btn.dataset.days === 'forever' ? 'НАВСЕГДА' : btn.dataset.days + ' дней'} за ${price} GM. Остаток: ${currentBalance}`);
        showToast(`✅ Тест-сервер заказан! Проверьте почту.`, '#22c55e');
        modal.style.display = 'none';
        await renderMainUI();
    });
    
    document.querySelectorAll('.nav-item').forEach(item => item.onclick = () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); item.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(`page${item.dataset.page.charAt(0).toUpperCase() + item.dataset.page.slice(1)}`).classList.add('active-page');
    });
    
    async function renderAuthPage() {
        document.getElementById('authContainer').innerHTML = `<div class="glass-card" style="max-width:400px; margin:50px auto;"><div class="flex" style="gap:12px; margin-bottom:20px;"><button id="loginTab" style="background:#3b82f6;">Вход</button><button id="registerTab">Регистрация</button></div><div id="loginForm"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPass" placeholder="Пароль"><button id="doLogin">Войти</button></div><div id="registerForm" style="display:none;"><input type="text" id="regUsername" placeholder="Никнейм"><input type="email" id="regEmail" placeholder="Email"><input type="password" id="regPass" placeholder="Пароль"><input type="text" id="regTag" placeholder="@username"><button id="doRegister">Зарегистрироваться</button></div></div>`;
        document.getElementById('loginTab').onclick = () => { document.getElementById('loginForm').style.display = 'block'; document.getElementById('registerForm').style.display = 'none'; };
        document.getElementById('registerTab').onclick = () => { document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; };
        document.getElementById('doLogin').onclick = async () => { try { await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value); } catch(e) { showToast(e.message, '#ef4444'); } };
        document.getElementById('doRegister').onclick = async () => { let email = document.getElementById('regEmail').value, pass = document.getElementById('regPass').value, name = document.getElementById('regUsername').value, tag = document.getElementById('regTag').value; if(!email||!pass||!name||!tag){showToast('Заполните все поля','#ef4444');return;} try{ await auth.createUserWithEmailAndPassword(email,pass); } catch(e){ showToast(e.message,'#ef4444'); } };
    }
    auth.onAuthStateChanged(async (user) => { if (user) { currentUser = user; document.getElementById('authContainer').classList.add('hidden'); document.getElementById('mainContainer').classList.remove('hidden'); await renderMainUI(); } else { document.getElementById('authContainer').classList.remove('hidden'); document.getElementById('mainContainer').classList.add('hidden'); await renderAuthPage(); } });
</script>
</body>
</html>
