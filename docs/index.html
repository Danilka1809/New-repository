<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrifLauncher</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(ellipse at 30% 20%, #0a0f1a, #03050a);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #eef2ff;
            padding-bottom: 70px;
        }
        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }
        .glass-card {
            background: rgba(18,25,45,0.55);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(59,130,246,0.25);
            transition: 0.2s;
        }
        .glass-card:hover { border-color: rgba(59,130,246,0.5); transform: translateY(-3px); }
        
        /* Шапка */
        .hero {
            text-align: center;
            padding: 50px 20px;
            margin-bottom: 30px;
            background: radial-gradient(ellipse at 70% 30%, rgba(59,130,246,0.1), transparent);
        }
        .hero h1 {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .hero p { color: #8b9dc3; margin: 16px 0 24px; font-size: 18px; }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            padding: 12px 32px;
            border-radius: 60px;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        
        /* Карточки товаров */
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }
        .privilege-card {
            background: linear-gradient(145deg, #111827, #0f172a);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            border: 1px solid #3b82f6;
            transition: 0.2s;
        }
        .privilege-card:hover { transform: translateY(-5px); }
        .privilege-price { font-size: 28px; color: #facc15; font-weight: bold; margin: 12px 0; }
        .privilege-desc { font-size: 13px; color: #8b9dc3; margin-bottom: 16px; }
        .buy-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: none;
            color: white;
            cursor: pointer;
            margin-top: 12px;
        }
        .gm-note { font-size: 11px; color: #6c7a91; margin-top: 8px; }
        .section-title {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin: 40px 0 20px;
            background: linear-gradient(135deg, #fff, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Нижнее меню */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10,14,23,0.95);
            backdrop-filter: blur(16px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px;
            border-top: 1px solid rgba(59,130,246,0.4);
            z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; padding: 6px 12px; border-radius: 40px;
            color: #8b9dc3; transition: 0.2s;
        }
        .nav-item.active { color: #3b82f6; background: rgba(59,130,246,0.2); }
        .nav-icon { font-size: 24px; }
        .nav-label { font-size: 11px; }
        .page { display: none; }
        .page.active-page { display: block; }
        
        /* Профиль */
        .flex { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .balance { color: #facc15; font-size: 24px; font-weight: bold; }
        .avatar-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; background: #1e293b; border: 2px solid #3b82f6; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            background: rgba(0,0,0,0.4);
            border: 1px solid #3b82f6;
            border-radius: 40px;
            color: white;
        }
        button { background: linear-gradient(135deg, #3b82f6, #2563eb); cursor: pointer; font-weight: bold; }
        .friend-card {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .chat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 28px; }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .chat-messages { height: 350px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 12px; margin-bottom: 16px; }
        .message { background: rgba(59,130,246,0.2); border-radius: 12px; padding: 8px 12px; margin-bottom: 8px; max-width: 80%; }
        .message.own { background: rgba(34,197,94,0.2); text-align: right; margin-left: auto; }
        .message-sender { font-size: 11px; color: #8b9dc3; margin-bottom: 4px; }
        .badge-rainbow { background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet); -webkit-background-clip: text; background-clip: text; color: transparent; animation: rainbow 2s linear infinite; background-size: 200%; }
        @keyframes rainbow { 0% { background-position: 0%; } 100% { background-position: 200%; } }
        .emoji-panel { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; background: rgba(0,0,0,0.3); border-radius: 28px; padding: 12px; }
        .emoji-btn { width: 44px; height: 44px; background: rgba(59,130,246,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; }
        .server-selector { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
        .server-btn { background: rgba(0,0,0,0.4); border: 1px solid rgba(59,130,246,0.3); border-radius: 40px; padding: 8px 20px; cursor: pointer; width: auto; }
        .server-btn.active { background: #3b82f6; }
        .back-btn { background: #ef4444; padding: 6px 16px; border-radius: 40px; cursor: pointer; display: inline-block; font-size: 14px; margin-bottom: 16px; width: auto; }
        #toast { position: fixed; bottom: 80px; right: 20px; background: #22c55e; padding: 12px 24px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; }
    </style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCDHaYgSlhr-fvv8kPysZtfMWsXLHIfh48",
        authDomain: "griflaunc.firebaseapp.com",
        projectId: "griflaunc",
        storageBucket: "griflaunc.firebasestorage.app",
        messagingSenderId: "946120100074",
        appId: "1:946120100074:web:b672de237e7101b5a9ef93"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null, currentProfile = null, currentBalance = 0, selectedServer = 'survival', friendsList = [], currentChatFriend = null;
    let purchasedEmojis = [];
    
    const privileges = [
        { name: '🎨 Креатив', price: 1000, key: 'creative', desc: 'Режим творчества, /fly, /gm 1', days: '30 дней' },
        { name: '🛡️ Модер', price: 2500, key: 'moder', desc: 'Присмотр за порядком, /mute, /kick', days: '30 дней' },
        { name: '⚔️ Лорд', price: 5000, key: 'lord', desc: 'Уважение, /god, /heal', days: '60 дней' },
        { name: '👑 Админ', price: 10000, key: 'admin', desc: 'Управление сервером, полный контроль', days: 'Навсегда' },
        { name: '🔱 Гл. Админ', price: 20000, key: 'headadmin', desc: 'Правая рука владельца', days: 'Навсегда' },
        { name: '💎 Владелец', price: 50000, key: 'owner', desc: 'Абсолютная власть, все команды', days: 'Навсегда' }
    ];
    
    const emojiPacks = [
        { id: 1, name: '📱 Telegram Pack', price: 10000, emojis: ['✅','✔️','⭐','🔥','❤️'] },
        { id: 2, name: '👑 Royal Pack', price: 20000, emojis: ['👑','💎','🌟','✨','⚡'] }
    ];
    
    const botData = { id: "BOT_GRIFMCPRO", username: "GrifMcPro", tag: "@grifmcpro", avatar: "https://cdn-icons-png.flaticon.com/512/1998/1998708.png", badge: "rainbow" };

    function showToast(msg, color = '#22c55e') { let t = document.getElementById('toast'); t.style.backgroundColor = color; t.innerText = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); }
    async function sendEmail(subject, text) { await fetch('https://api.web3forms.com/submit', { method: 'POST', body: JSON.stringify({ access_key: '42864224-6df0-4e25-8068-7b486cf314dd', name: 'GrifLauncher', email: 'ramonenok@bk.ru', subject: subject, message: text }), headers: { 'Content-Type': 'application/json' } }).catch(console.error); }
    
    async function loadProfile() {
        if (!currentUser) return;
        let doc = await db.collection('profiles').doc(currentUser.uid).get();
        if (doc.exists) {
            currentProfile = doc.data();
            currentBalance = currentProfile.balance || 50000;
            purchasedEmojis = currentProfile.emojiPacks || [];
        } else {
            await db.collection('profiles').doc(currentUser.uid).set({ username: currentUser.email.split('@')[0], tag: '@'+currentUser.email.split('@')[0], balance: 50000, emojiPacks: [] });
            currentProfile = { username: currentUser.email.split('@')[0], tag: '@'+currentUser.email.split('@')[0], balance: 50000, emojiPacks: [] };
            currentBalance = 50000;
        }
    }
    
    async function loadFriends() {
        if (!currentUser) return;
        let snap = await db.collection('friends').where('userId', '==', currentUser.uid).where('status', '==', 'accepted').get();
        friendsList = [];
        for (let doc of snap.docs) {
            let fd = await db.collection('profiles').doc(doc.data().friendId).get();
            if (fd.exists) friendsList.push({ id: fd.id, ...fd.data() });
        }
        if (!friendsList.find(f => f.id === botData.id)) friendsList.unshift(botData);
    }
    
    async function sendMessage(toId, text) {
        let chatId = [currentUser.uid, toId].sort().join('_');
        await db.collection('messages').add({ chatId, from: currentUser.uid, text, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        if (toId === botData.id) {
            setTimeout(async () => {
                await db.collection('messages').add({ chatId, from: botData.id, text: 'Привет! Я бот этого сайта, сейчас в бета-тесте.', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                if (currentChatFriend && currentChatFriend.id === botData.id) await loadMessages();
            }, 1000);
        }
    }
    
    async function loadMessages() {
        if (!currentChatFriend) return;
        let chatId = [currentUser.uid, currentChatFriend.id].sort().join('_');
        let msgs = await db.collection('messages').where('chatId', '==', chatId).orderBy('timestamp').get();
        let container = document.getElementById('chatMessages');
        if (!container) return;
        container.innerHTML = '';
        msgs.forEach(doc => {
            let msg = doc.data();
            let isOwn = msg.from === currentUser.uid;
            let isBot = msg.from === botData.id;
            let name = isOwn ? 'Вы' : (isBot ? botData.username : currentChatFriend.username);
            let badge = (isBot && botData.badge === 'rainbow') ? '<span class="badge-rainbow">🌈✓</span>' : '';
            container.innerHTML += `<div class="message ${isOwn ? 'own' : ''}"><div class="message-sender">${name}${badge}</div><div>${msg.text}</div></div>`;
        });
        container.scrollTop = container.scrollHeight;
    }
    
    async function renderUI() {
        if (!currentUser) {
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="glass-card" style="max-width:400px; margin:60px auto;">
                        <div class="flex" style="margin-bottom:20px;">
                            <button id="loginTab" style="background:#3b82f6;">Вход</button>
                            <button id="registerTab">Регистрация</button>
                        </div>
                        <div id="loginForm"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPass" placeholder="Пароль"><button id="doLogin">Войти</button></div>
                        <div id="registerForm" style="display:none;"><input type="text" id="regUsername" placeholder="Никнейм"><input type="email" id="regEmail" placeholder="Email"><input type="password" id="regPass" placeholder="Пароль"><input type="text" id="regTag" placeholder="@username"><button id="doRegister">Регистрация</button></div>
                    </div>
                </div>
            `;
            document.getElementById('loginTab').onclick = () => { document.getElementById('loginForm').style.display = 'block'; document.getElementById('registerForm').style.display = 'none'; };
            document.getElementById('registerTab').onclick = () => { document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; };
            document.getElementById('doLogin').onclick = async () => { try { await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value); } catch(e) { showToast(e.message, '#ef4444'); } };
            document.getElementById('doRegister').onclick = async () => { let email = document.getElementById('regEmail').value, pass = document.getElementById('regPass').value, name = document.getElementById('regUsername').value, tag = document.getElementById('regTag').value; if(!email||!pass||!name||!tag) { showToast('Заполните все поля','#ef4444'); return; } try { await auth.createUserWithEmailAndPassword(email,pass); } catch(e) { showToast(e.message,'#ef4444'); } };
            return;
        }
        
        await loadProfile(); await loadFriends();
        
        let storeHtml = '';
        privileges.forEach(p => {
            storeHtml += `
                <div class="privilege-card">
                    <h3>${p.name}</h3>
                    <div class="privilege-price">💰 ${p.price} GM</div>
                    <div class="privilege-desc">${p.desc}<br>⏱️ ${p.days}</div>
                    <input type="text" id="nick_${p.key}" placeholder="Ваш ник">
                    <button class="buy-btn" onclick="buy('${p.key}', ${p.price})">КУПИТЬ</button>
                    <div class="gm-note">* Цена в игровой валюте GM</div>
                </div>
            `;
        });
        
        let friendsHtml = '';
        friendsList.forEach(f => { friendsHtml += `<div class="friend-card" onclick="openChat('${f.id}', '${f.username}')"><div><b>${f.username}</b> ${f.tag}</div><span>💬</span></div>`; });
        
        let emojiPanelHtml = '';
        for (let pid of purchasedEmojis) {
            let pack = emojiPacks.find(p => p.id === pid);
            if (pack) pack.emojis.forEach(e => { emojiPanelHtml += `<div class="emoji-btn" onclick="addEmoji('${e}')">${e}</div>`; });
        }
        
        let packsHtml = '';
        emojiPacks.forEach(p => {
            let owned = purchasedEmojis.includes(p.id);
            packsHtml += `<div class="friend-card" style="justify-content:space-between;" onclick="${!owned ? `buyPack(${p.id}, ${p.price})` : ''}"><div><b>${p.name}</b><div style="font-size:20px;">${p.emojis.slice(0,4).join('')}</div></div><div>💰 ${p.price} GM${owned ? ' ✅' : ''}</div></div>`;
        });
        
        document.getElementById('app').innerHTML = `
            <div class="container">
                <!-- ГЛАВНАЯ -->
                <div id="pageMain" class="page active-page">
                    <div class="hero"><h1>GRIF LAUNCHER</h1><p>Лучший игровой опыт на Minecraft сервере</p><button class="btn-primary" id="gotoShopBtn">🛒 Перейти в магазин</button></div>
                    <div class="glass-card" style="text-align:center; padding:30px;"><div class="flex" style="justify-content:center; gap:40px;"><div>🔥 +1000 игроков</div><div>⚡ 24/7 поддержка</div><div>🎁 Мгновенная выдача</div></div></div>
                    <div class="section-title">✨ ДОСТУПНЫЕ ПРИВИЛЕГИИ</div>
                    <div class="server-selector"><button class="server-btn active" data-server="survival">🏔️ Выживание #1</button><button class="server-btn" data-server="test">🧪 Тест сервер</button></div>
                    <div class="store-grid">${storeHtml}</div>
                </div>
                
                <!-- ПРОФИЛЬ -->
                <div id="pageProfile" class="page">
                    <div class="glass-card">
                        <div class="flex" style="justify-content:space-between;"><div><h2>${currentProfile?.username}</h2><div>${currentProfile?.tag}</div><div class="balance">💰 ${currentBalance} GM</div></div><img class="avatar-img" src="https://ui-avatars.com/api/?background=3b82f6&color=fff&size=70"></div>
                        <input type="text" id="editUsername" placeholder="Новый никнейм"><input type="text" id="editTag" placeholder="Новый тег"><button id="saveProfile">Сохранить</button>
                        <button id="logoutBtn" style="background:#ef4444; margin-top:16px;">Выйти</button>
                    </div>
                    <div class="glass-card"><h3>🎨 Смайл-паки</h3>${packsHtml}</div>
                </div>
                
                <!-- ДРУЗЬЯ -->
                <div id="pageFriends" class="page"><div class="glass-card"><h3>👥 Друзья</h3><div id="friendsList">${friendsHtml}</div><div class="flex"><input type="text" id="searchInput" placeholder="Поиск"><button id="searchBtn">🔍</button></div><div id="searchRes"></div></div></div>
                
                <!-- ЧАТ -->
                <div id="pageChat" class="page">
                    <div class="glass-card">
                        <div id="chatList"><h3>💬 Диалоги</h3><div id="chatFriendsList">${friendsHtml}</div></div>
                        <div id="chatBox" style="display:none;">
                            <div class="back-btn" id="backBtn">← Назад</div>
                            <div class="chat-header" id="chatHeader"></div>
                            <div id="chatMessages" class="chat-messages"></div>
                            <div class="emoji-panel" id="emojiPanel">${emojiPanelHtml}</div>
                            <div class="flex"><input type="text" id="chatInput" placeholder="Сообщение"><button id="sendMsg">📤</button></div>
                        </div>
                    </div>
                </div>
                
                <!-- МАГАЗИН -->
                <div id="pageShop" class="page">
                    <div class="server-selector"><button class="server-btn active" data-server="survival">🏔️ Выживание #1</button><button class="server-btn" data-server="test">🧪 Тест сервер</button></div>
                    <div class="store-grid">${storeHtml}</div>
                </div>
            </div>
            <div class="bottom-nav">
                <div class="nav-item active" data-page="main"><div class="nav-icon">🏠</div><div class="nav-label">Главная</div></div>
                <div class="nav-item" data-page="profile"><div class="nav-icon">👤</div><div class="nav-label">Профиль</div></div>
                <div class="nav-item" data-page="friends"><div class="nav-icon">👥</div><div class="nav-label">Друзья</div></div>
                <div class="nav-item" data-page="chat"><div class="nav-icon">💬</div><div class="nav-label">Чат</div></div>
                <div class="nav-item" data-page="shop"><div class="nav-icon">🛒</div><div class="nav-label">Магазин</div></div>
            </div>
        `;
        
        // Навигация
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                let page = item.dataset.page;
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                document.getElementById(`page${page.charAt(0).toUpperCase() + page.slice(1)}`).classList.add('active-page');
            };
        });
        
        document.getElementById('gotoShopBtn')?.addEventListener('click', () => { document.getElementById('pageShop').classList.add('active-page'); document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById('pageShop').classList.add('active-page'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.querySelector('.nav-item[data-page="shop"]').classList.add('active'); });
        
        document.getElementById('saveProfile')?.addEventListener('click', async () => {
            let newName = document.getElementById('editUsername').value.trim();
            let newTag = document.getElementById('editTag').value.trim();
            if (newName) await db.collection('profiles').doc(currentUser.uid).update({ username: newName });
            if (newTag) await db.collection('profiles').doc(currentUser.uid).update({ tag: newTag });
            showToast('Профиль обновлён');
            renderUI();
        });
        document.getElementById('logoutBtn')?.addEventListener('click', async () => { await auth.signOut(); location.reload(); });
        
        document.getElementById('searchBtn')?.addEventListener('click', async () => {
            let q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            let snap = await db.collection('profiles').where('username', '>=', q).where('username', '<=', q + '\uf8ff').get();
            let res = [];
            snap.forEach(d => { if (d.id !== currentUser.uid && !friendsList.find(f => f.id === d.id)) res.push({ id: d.id, ...d.data() }); });
            document.getElementById('searchRes').innerHTML = res.map(u => `<div class="friend-card" onclick="addFriend('${u.id}')"><div><b>${u.username}</b> ${u.tag}</div><button>➕ Добавить</button></div>`).join('') || '<p>Не найдено</p>';
        });
        
        document.querySelectorAll('.server-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedServer = btn.dataset.server;
                renderUI();
            };
        });
        
        document.getElementById('sendMsg')?.addEventListener('click', async () => {
            let inp = document.getElementById('chatInput');
            if (currentChatFriend && inp.value.trim()) {
                await sendMessage(currentChatFriend.id, inp.value);
                inp.value = '';
                await loadMessages();
            }
        });
        
        window.addEmoji = (e) => { let inp = document.getElementById('chatInput'); if(inp) inp.value += e; };
        window.buy = async (key, price) => {
            let nick = document.getElementById(`nick_${key}`)?.value;
            if (!nick) { showToast('Введи ник!', '#ef4444'); return; }
            if (currentBalance < price) { showToast(`Не хватает GM! Нужно: ${price}`, '#ef4444'); return; }
            await db.collection('profiles').doc(currentUser.uid).update({ balance: currentBalance - price });
            currentBalance -= price;
            await sendEmail('Покупка', `${nick} купил ${key} за ${price} GM на сервере ${selectedServer === 'survival' ? 'Выживание #1' : 'Тест сервер'}`);
            showToast(`✅ ${key} выдана! Донат в течение 10 мин.`, '#22c55e');
            renderUI();
        };
        window.buyPack = async (id, price) => {
            if (currentBalance < price) { showToast(`Не хватает GM! Нужно: ${price}`, '#ef4444'); return; }
            if (purchasedEmojis.includes(id)) { showToast('Уже есть!', '#facc15'); return; }
            await db.collection('profiles').doc(currentUser.uid).update({ balance: currentBalance - price, emojiPacks: [...purchasedEmojis, id] });
            currentBalance -= price; purchasedEmojis.push(id);
            showToast('✅ Смайл-пак куплен!', '#22c55e');
            renderUI();
        };
        window.addFriend = async (id) => { await db.collection('friends').add({ userId: currentUser.uid, friendId: id, status: 'accepted' }); showToast('Друг добавлен!'); renderUI(); };
        window.openChat = async (id, name) => {
            currentChatFriend = friendsList.find(f => f.id === id) || { id, username: name };
            await loadMessages();
            document.getElementById('chatList').style.display = 'none';
            document.getElementById('chatBox').style.display = 'block';
            let avatar = currentChatFriend.id === botData.id ? botData.avatar : 'https://ui-avatars.com/api/?background=3b82f6&color=fff&size=40';
            let badge = (currentChatFriend.id === botData.id && botData.badge === 'rainbow') ? '<span class="badge-rainbow">🌈✓</span>' : '';
            document.getElementById('chatHeader').innerHTML = `<img class="chat-avatar" src="${avatar}"><div><b>${currentChatFriend.username}</b>${badge}<div style="font-size:12px;">${currentChatFriend.tag || ''}</div></div>`;
        };
        document.getElementById('backBtn')?.addEventListener('click', () => {
            document.getElementById('chatList').style.display = 'block';
            document.getElementById('chatBox').style.display = 'none';
            currentChatFriend = null;
        });
    }
    
    auth.onAuthStateChanged(async (user) => {
        currentUser = user;
        await renderUI();
    });
</script>
</body>
</html>
