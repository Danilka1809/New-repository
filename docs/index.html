<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrifLauncher</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e17;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #eef2ff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .glass-card {
            background: rgba(18,25,45,0.6);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(59,130,246,0.2);
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(90deg, #fff, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(0,0,0,0.4);
            border: 1px solid #3b82f6;
            border-radius: 40px;
            color: white;
        }
        button {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            cursor: pointer;
            font-weight: bold;
        }
        .balance { color: #facc15; font-size: 24px; font-weight: bold; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .privilege-card { background: rgba(0,0,0,0.3); border-radius: 20px; padding: 16px; }
        .friend-card { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 16px; padding: 12px; margin: 12px 0; }
        .message { background: rgba(59,130,246,0.2); border-radius: 12px; padding: 8px; margin-bottom: 8px; }
        .flex { display: flex; gap: 12px; flex-wrap: wrap; }
        .hidden { display: none; }
        #toast { position: fixed; bottom: 20px; right: 20px; background: #22c55e; padding: 12px 24px; border-radius: 40px; opacity: 0; transition: 0.2s; z-index: 1000; }
        .tab-btn { flex: 1; background: rgba(59,130,246,0.2); border: none; padding: 12px; border-radius: 40px; cursor: pointer; color: white; }
        .tab-btn.active { background: #3b82f6; }
    </style>
</head>
<body>
<div class="container" id="app"></div>
<div id="toast"></div>

<script>
    // ========== FIREBASE КЛЮЧИ (уже вставлены) ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCDHaYgSlhr-fvv8kPysZtfMWsXLHIfh48",
        authDomain: "griflaunc.firebaseapp.com",
        projectId: "griflaunc",
        storageBucket: "griflaunc.firebasestorage.app",
        messagingSenderId: "946120100074",
        appId: "1:946120100074:web:b672de237e7101b5a9ef93"
    };
    // =====================================================

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Привилегии
    const privileges = [
        { name: '🎨 Креатив', price: 1000, key: 'creative' },
        { name: '🛡️ Модер', price: 2500, key: 'moder' },
        { name: '⚔️ Лорд', price: 5000, key: 'lord' },
        { name: '👑 Админ', price: 10000, key: 'admin' },
        { name: '🔱 Гл. Админ', price: 20000, key: 'headadmin' },
        { name: '✨ Создатель', price: 30000, key: 'creator' },
        { name: '🔥 Основатель', price: 40000, key: 'founder' },
        { name: '💎 Владелец', price: 50000, key: 'owner' },
        { name: '🏛️ Цезарь', price: 70000, key: 'caesar' },
        { name: '👑 ПРАВИТЕЛЬ', price: 100000, key: 'ruler' }
    ];

    let currentUser = null;
    let currentProfile = null;
    let currentBalance = 0;
    let friendsList = [];
    let currentChatWith = null;

    function showToast(msg, color = '#22c55e') {
        const toast = document.getElementById('toast');
        toast.style.backgroundColor = color;
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 3000);
    }

    async function loadProfile() {
        if (!currentUser) return;
        const doc = await db.collection('profiles').doc(currentUser.uid).get();
        if (doc.exists) {
            currentProfile = doc.data();
            currentBalance = currentProfile.balance || 50000;
        } else {
            const username = currentUser.email.split('@')[0];
            const tag = '@' + username;
            await db.collection('profiles').doc(currentUser.uid).set({ username, tag, balance: 50000, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            currentProfile = { username, tag, balance: 50000 };
            currentBalance = 50000;
        }
    }

    async function loadFriends() {
        if (!currentUser) return;
        const snapshot = await db.collection('friends').where('userId', '==', currentUser.uid).where('status', '==', 'accepted').get();
        friendsList = [];
        for (const doc of snapshot.docs) {
            const friendId = doc.data().friendId;
            const friendDoc = await db.collection('profiles').doc(friendId).get();
            if (friendDoc.exists) friendsList.push({ id: friendId, ...friendDoc.data() });
        }
    }

    async function buyPrivilege(key, price, serverNick) {
        if (!serverNick) { showToast('❌ Введи ник на сервере!', '#ef4444'); return false; }
        if (currentBalance < price) { showToast(`❌ Не хватает GM! Нужно: ${price}`, '#ef4444'); return false; }
        const newBalance = currentBalance - price;
        await db.collection('profiles').doc(currentUser.uid).update({ balance: newBalance });
        currentBalance = newBalance;
        showToast(`✅ ${key} выдана! Донат в течение 10 минут.`, '#22c55e');
        return true;
    }

    async function renderMainPage() {
        if (!currentUser) return;
        await loadProfile();
        await loadFriends();

        let storeHtml = privileges.map(p => `
            <div class="privilege-card">
                <h3>${p.name}</h3>
                <div>💰 ${p.price} GM</div>
                <input type="text" id="nick_${p.key}" placeholder="Ваш ник на сервере">
                <button onclick="buy('${p.key}', ${p.price})">🎁 Купить</button>
            </div>
        `).join('');

        let friendsHtml = friendsList.map(f => `
            <div class="friend-card">
                <div><b>${f.username}</b> <span style="font-size:12px;">${f.tag}</span></div>
                <button onclick="openChat('${f.id}', '${f.username}')">💬 Чат</button>
            </div>
        `).join('');
        if (!friendsHtml) friendsHtml = '<p>У вас пока нет друзей. Найдите их по поиску!</p>';

        document.getElementById('app').innerHTML = `
            <div class="glass-card">
                <div class="logo">GRIF LAUNCHER</div>
                <div class="flex" style="justify-content: space-between; align-items: center;">
                    <div>👤 ${currentProfile?.username || ''} <span style="color:#8b9dc3;">${currentProfile?.tag || ''}</span></div>
                    <div class="balance">💰 ${currentBalance} GM</div>
                </div>
            </div>
            <div class="glass-card">
                <h3>🎁 МАГАЗИН</h3>
                <div class="store-grid">${storeHtml}</div>
            </div>
            <div class="glass-card">
                <h3>👥 ДРУЗЬЯ</h3>
                <div id="friendsListDiv">${friendsHtml}</div>
                <div class="flex" style="margin-top: 15px;">
                    <input type="text" id="searchInput" placeholder="Поиск по нику или @tag">
                    <button id="searchBtn">🔍</button>
                </div>
                <div id="searchResults"></div>
            </div>
            <div id="chatArea" class="glass-card hidden">
                <div class="flex" style="justify-content: space-between;">
                    <h3>💬 Чат с <span id="chatWithName"></span></h3>
                    <button id="closeChat" style="width: auto; background:#ef4444;">✖</button>
                </div>
                <div id="chatMessages" class="chat-messages"></div>
                <div class="flex">
                    <input type="text" id="chatInput" placeholder="Сообщение...">
                    <button id="sendMsg">📤</button>
                </div>
            </div>
        `;

        document.getElementById('searchBtn')?.addEventListener('click', async () => {
            const query = document.getElementById('searchInput').value;
            if (!query.trim()) return;
            const snapshot = await db.collection('profiles').where('username', '>=', query).where('username', '<=', query + '\uf8ff').get();
            const results = [];
            snapshot.forEach(doc => { if (doc.id !== currentUser.uid) results.push({ id: doc.id, ...doc.data() }); });
            document.getElementById('searchResults').innerHTML = results.map(u => `
                <div class="friend-card">
                    <div><b>${u.username}</b> ${u.tag}</div>
                    <button onclick="addFriend('${u.id}')">➕ Добавить</button>
                </div>
            `).join('');
            if (results.length === 0) document.getElementById('searchResults').innerHTML = '<p>Не найдено</p>';
        });

        document.getElementById('closeChat')?.addEventListener('click', () => {
            document.getElementById('chatArea').classList.add('hidden');
            currentChatWith = null;
        });

        document.getElementById('sendMsg')?.addEventListener('click', async () => {
            const input = document.getElementById('chatInput');
            if (currentChatWith && input.value.trim()) {
                await db.collection('messages').add({
                    from: currentUser.uid,
                    to: currentChatWith.id,
                    text: input.value,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = '';
                await renderChatWindow(currentChatWith);
            }
        });
    }

    window.buy = async (key, price) => {
        const nick = document.getElementById(`nick_${key}`)?.value;
        await buyPrivilege(key, price, nick);
        await renderMainPage();
    };

    window.openChat = async (id, name) => {
        currentChatWith = { id, username: name };
        await renderChatWindow(currentChatWith);
    };

    window.addFriend = async (id) => {
        await db.collection('friends').add({
            userId: currentUser.uid,
            friendId: id,
            status: 'accepted',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('Друг добавлен!');
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('searchInput').value = '';
        await renderMainPage();
    };

    async function renderChatWindow(friend) {
        const messagesSnapshot = await db.collection('messages')
            .where('from', 'in', [[currentUser.uid, friend.id], [friend.id, currentUser.uid]])
            .orderBy('timestamp')
            .get();
        const messages = [];
        messagesSnapshot.forEach(doc => messages.push(doc.data()));
        const chatDiv = document.getElementById('chatMessages');
        document.getElementById('chatArea').classList.remove('hidden');
        document.getElementById('chatWithName').innerText = friend.username;
        chatDiv.innerHTML = messages.map(m => `
            <div class="message">
                <b>${m.from === currentUser.uid ? 'Вы' : friend.username}:</b> ${m.text}
                <div style="font-size: 10px; color: #8b9dc3;">${m.timestamp?.toDate().toLocaleTimeString() || ''}</div>
            </div>
        `).join('');
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function renderAuthPage() {
        document.getElementById('app').innerHTML = `
            <div class="glass-card" style="max-width: 400px; margin: 50px auto;">
                <div class="logo">GRIF LAUNCHER</div>
                <div class="flex" style="margin-bottom: 20px;">
                    <button class="tab-btn active" id="loginTab">Вход</button>
                    <button class="tab-btn" id="registerTab">Регистрация</button>
                </div>
                <div id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPass" placeholder="Пароль">
                    <button id="doLogin">Войти</button>
                </div>
                <div id="registerForm" style="display:none;">
                    <input type="text" id="regUsername" placeholder="Никнейм">
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPass" placeholder="Пароль">
                    <input type="text" id="regTag" placeholder="@username">
                    <button id="doRegister">Зарегистрироваться</button>
                </div>
            </div>
        `;

        document.getElementById('loginTab').onclick = () => {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('registerTab').classList.remove('active');
        };
        document.getElementById('registerTab').onclick = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('registerTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
        };
        document.getElementById('doLogin').onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;
            try {
                const { user } = await auth.signInWithEmailAndPassword(email, password);
                currentUser = user;
                await renderMainPage();
            } catch (error) { showToast(error.message, '#ef4444'); }
        };
        document.getElementById('doRegister').onclick = async () => {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;
            const tag = document.getElementById('regTag').value;
            if (!username || !email || !password || !tag) { showToast('Заполните все поля!', '#ef4444'); return; }
            try {
                const { user } = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('profiles').doc(user.uid).set({ username, tag, balance: 50000, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                currentUser = user;
                await renderMainPage();
            } catch (error) { showToast(error.message, '#ef4444'); }
        };
    }

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            await renderMainPage();
        } else {
            currentUser = null;
            await renderAuthPage();
        }
    });
</script>
</body>
</html>
