<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrifLauncher | Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a0a 100%);
            font-family: 'Montserrat', sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }
        /* ВИДЕО ФОН */
        .hero-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.4;
        }
        .hero-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(30,30,0,0.6));
            z-index: -1;
        }
        .main-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .hero h1 {
            font-family: 'Orbitron', monospace;
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 30px;
        }
        /* КНОПКИ */
        .btn-main {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0a0a0a;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            padding: 14px 40px;
            font-size: 18px;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-main:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(255,215,0,0.5);
        }
        /* МОДАЛКА */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border-radius: 32px;
            padding: 32px;
            width: 450px;
            max-width: 90%;
            border: 1px solid rgba(255,215,0,0.3);
            position: relative;
            margin: 0 auto;
        }
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            justify-content: center;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: 'Orbitron', monospace;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0a0a0a;
        }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 60px;
            color: white;
            font-size: 16px;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #ffd700;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0a0a0a;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            padding: 14px;
            font-size: 18px;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .submit-btn:hover {
            transform: scale(1.01);
        }
        .close-modal {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #ffd700;
        }
        .close-modal:hover {
            color: #fff;
        }
        /* ПОСЛЕ ВХОДА */
        .dashboard {
            display: none;
        }
        .dashboard-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        .dashboard-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0a0a0a;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }
        .dashboard-btn:hover {
            transform: scale(1.02);
        }
        @media (max-width: 768px) {
            .hero h1 { font-size: 40px; }
            .dashboard-buttons { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <video class="hero-video" autoplay loop muted playsinline>
        <source src="https://cdn.pixabay.com/video/2022/11/20/140315-774259399_large.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <!-- ГЛАВНАЯ СТРАНИЦА С ВХОДОМ -->
    <div id="mainPage" class="main-container">
        <div class="hero">
            <h1>GRIF LAUNCHER</h1>
            <p>Лучший игровой опыт с привилегиями, поддержкой и активным сообществом</p>
            <button class="btn-main" id="showAuthBtn">🔥 ВХОД / РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <!-- ДАШБОРД (ПОСЛЕ ВХОДА) -->
    <div id="dashboard" class="main-container dashboard">
        <div class="hero">
            <h1>GRIF LAUNCHER</h1>
            <p>Добро пожаловать, <span id="userNameDisplay">Игрок</span>!</p>
            <div class="dashboard-buttons">
                <a href="shop.html" class="dashboard-btn">🛒 МАГАЗИН</a>
                <a href="profile.html" class="dashboard-btn">👤 ПРОФИЛЬ</a>
                <a href="gallery.html" class="dashboard-btn">🖼️ ГАЛЕРЕЯ</a>
                <button id="logoutBtn" class="dashboard-btn" style="background:#ef4444; color:white;">🚪 ВЫЙТИ</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ВХОДА/РЕГИСТРАЦИИ -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">ВХОД</button>
                <button class="tab-btn" data-tab="register">РЕГИСТРАЦИЯ</button>
            </div>
            <div id="loginPane" class="tab-pane active">
                <div class="input-group"><input type="text" id="loginUsername" placeholder="Логин"></div>
                <div class="input-group"><input type="password" id="loginPassword" placeholder="Пароль"></div>
                <button class="submit-btn" id="doLogin">ВОЙТИ</button>
            </div>
            <div id="registerPane" class="tab-pane">
                <div class="input-group"><input type="text" id="regUsername" placeholder="Логин"></div>
                <div class="input-group"><input type="email" id="regEmail" placeholder="Email"></div>
                <div class="input-group"><input type="password" id="regPassword" placeholder="Пароль"></div>
                <button class="submit-btn" id="doRegister">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            </div>
        </div>
    </div>

    <script>
        // ========== ДЕМО-АВТОРИЗАЦИЯ (LOCALSTORAGE) ==========
        let currentUser = localStorage.getItem('currentUser');
        
        function updateUI() {
            const mainPage = document.getElementById('mainPage');
            const dashboard = document.getElementById('dashboard');
            const userNameSpan = document.getElementById('userNameDisplay');
            
            if (currentUser) {
                mainPage.style.display = 'none';
                dashboard.style.display = 'block';
                userNameSpan.innerText = currentUser;
            } else {
                mainPage.style.display = 'block';
                dashboard.style.display = 'none';
            }
        }
        
        // МОДАЛКА
        const modal = document.getElementById('authModal');
        document.getElementById('showAuthBtn').onclick = () => modal.style.display = 'flex';
        document.querySelector('.close-modal').onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
        
        // ВКЛАДКИ
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('loginPane').classList.toggle('active', btn.dataset.tab === 'login');
                document.getElementById('registerPane').classList.toggle('active', btn.dataset.tab === 'register');
            };
        });
        
        // ВХОД
        document.getElementById('doLogin').onclick = () => {
            const username = document.getElementById('loginUsername').value.trim();
            if (username) {
                currentUser = username;
                localStorage.setItem('currentUser', currentUser);
                updateUI();
                modal.style.display = 'none';
            } else {
                alert('Введите логин');
            }
        };
        
        // РЕГИСТРАЦИЯ
        document.getElementById('doRegister').onclick = () => {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPassword').value;
            if (username && email && pass) {
                currentUser = username;
                localStorage.setItem('currentUser', currentUser);
                updateUI();
                modal.style.display = 'none';
            } else {
                alert('Заполните все поля');
            }
        };
        
        // ВЫХОД
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('currentUser');
            currentUser = null;
            updateUI();
        };
        
        updateUI();
    </script>
</body>
</html>
